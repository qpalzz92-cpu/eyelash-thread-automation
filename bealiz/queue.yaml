posts:

  - id: notion-3a4f83fe90bd81f3a5baf96a5147426b
    title: "🔒 1. 유지력 컴플레인이 반복된다면, 답은 우리 안에 있어 ⭐"
    scheduled_at: "2026-07-21T21:30:00+09:00"
    approved: true
    body: |
      유지력 컴플레인, 손님 탓하기 제일 쉽지.
      근데 냉정하게 보자.

      어쩌다 한 명은 손님 변수 맞아.
      근데 '반복적으로' 나온다면?
      그건 손님이 아니라 우리 샵 문제야.

      인정하기 싫어도 여기서부터 실력이 갈려.
      남 탓하면 계속 그 자리고,
      내 안에서 원인 찾으면 기술이 늘어.

      손님 관리 얘기 꺼내기 전에
      온습도·글루·전처리·기법부터 점검해.

      반복 컴플레인은 문제가 아니라 '신호'야.
      공짜로 주는 내 샵 점검 리스트인 셈이지.

      유지력 때문에 스트레스받는 선생님 있으면 공유해줘. 남 탓만 하다 지치거든.
    reply: |
      1·2·3번(온습도·글루·전처리)이 다 맞는데도 안 나오면? 답은 4번, 기법이야.
      핵심은 '밀착'. 원모(자연모)와 가모(연장모)가 확실히 밀착된 상태에서 글루가 '락인'돼야 오래가.
      다들 이 4개 중 어디가 제일 자신 없어? 하나만 말해줘.

  - id: notion-3a4f83fe90bd81459a64e60bf5857413
    title: "🌱 2. 속눈썹 창업 전, 기술 말고 준비할 4가지"
    scheduled_at: "2026-07-22T21:30:00+09:00"
    approved: true
    body: |
      창업 전에 기술만 준비하지? 그건 절반이야.
      기술 말고 이것부터 챙겨.

      1. 가격 기준
         "얼마 받을지"를 감으로 정하지 마. 이유를 붙여.

      2. 재방문 설계
         신규보다 '다시 오게' 만드는 게 먼저.

      3. 나만의 한 줄
         "왜 여기 와야 하는지" 한 문장으로 말 되게.

      4. 버티는 돈
         손님 없어도 몇 달 버틸 여유.
         이게 없으면 조급해져서 싸게 판다.

      기술은 학원이 가르쳐주지만
      이 4개는 아무도 안 가르쳐줘.
      근데 이게 창업의 생존을 정해.

      창업 준비하는 사람 있으면 저장해두라고 공유해줘.
    reply: |
      이 중 딱 하나만 먼저 하라면 '4번(버티는 돈)'이야.
      돈이 급하면 무조건 싸게 받게 되고, 싸게 받으면 몸이 갈리고, 그럼 오래 못 가.
      여유가 배짱을 만들고, 배짱이 제값을 받게 해.
      다들 이 4개 중 뭐가 제일 부족한 것 같아? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd811b8196ed3c6340ae95
    title: "🌱 2. 기술만 배우면 창업 성공한다는 착각 ⭐"
    scheduled_at: "2026-07-23T21:30:00+09:00"
    approved: true
    body: |
      속눈썹 창업, 기술만 좋으면 될 것 같지?
      아니야. 그건 입장권일 뿐이야.

      기술 좋은 원장, 널렸어.
      근데 그중 오래 가는 사람은 따로 있어.

      기술은 '시작'을 만들지
      '유지'를 만들진 않거든.

      같은 실력인데
      누구는 자리 잡고, 누구는 몇 달 만에 닫아.
      그 차이는 기술이 아니라
      가격·재방문·나만의 이유를 설계했느냐야.

      기술은 계속 갈고닦되,
      창업은 '기술 밖'을 준비한 사람이 이겨.

      기술만 파고 있는 예비 원장 있으면 이 글 공유해줘.
    reply: |
      오해하지 마. 기술 대충 하란 게 절대 아니야. 기술은 기본 중의 기본이야.
      근데 기술'만' 100점이고 나머지가 0점이면 그 샵은 안 굴러가.
      기술이 탄탄하면서 운영 준비도 같이 돼 있어야 살아남아.
      다들 창업 준비하면서 기술 말고 뭘 제일 신경 쓰고 있어?

  - id: notion-3a4f83fe90bd8113aa63ee4f50b14e48
    title: "💬 3. 디자인 상담, 이 순서로 하면 실패 안 해"
    scheduled_at: "2026-07-24T21:30:00+09:00"
    approved: true
    body: |
      디자인 상담, 감으로 하지 마. 순서가 있어.

      1. 원하는 것 듣기
         "어떤 느낌 원하세요?". 단어 말고 '느낌'을 물어.

      2. 눈매 관찰
         눈 크기·모양·자연모 상태·처짐 정도. 여기서 답 절반 나와.

      3. 라이프스타일 질문
         화장 습관, 관리 가능 시간. 유지 편한 디자인이 만족도 높아.

      4. 제안 + 이유
         "○○님은 이게 어울려요, 왜냐면~"
         이유를 붙이면 신뢰가 확 올라가.

      핵심: 손님이 '고른' 게 아니라
      '좋은 걸 알게 됐다'고 느끼게 하는 것.

      이 순서 저장해두고 상담 때 써봐. 상담 약한 선생님 있으면 공유해주고.
    reply: |
      제일 중요한 건 2번(눈매 관찰)이야. 근데 초보일수록 이걸 건너뛰고 손님 말만 들어.
      눈매를 3초만 봐도 "이 손님은 이게 안 어울리겠다"가 보여야 실력이 붙은 거야.
      다들 상담할 때 눈매에서 제일 먼저 뭘 봐? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd81cca3d8ee72d7835e28
    title: "💬 3. '손님이 원하는 대로'가 프로가 아니야 ⭐"
    scheduled_at: "2026-07-25T21:30:00+09:00"
    approved: true
    body: |
      손님이 원하는 대로 해주는 게
      서비스라고 생각하지?

      반은 맞고 반은 틀려.

      손님은 '결과'를 원하지
      '방법'을 아는 게 아니야.
      근데 방법까지 손님한테 맡기면
      결과가 아쉬워도 그건 네 실력으로 남아.

      "길게 해달라"는 말 뒤엔
      사실 "예뻐 보이고 싶다"가 있어.
      그걸 읽고 어울리는 길이를 짚어주는 게 프로야.

      손님 말을 '통역'하는 거야.
      말한 단어가 아니라, 원하는 진짜를.

      그래서 상담이 기술만큼 중요해.
      디자인은 시술 전에 이미 정해지거든.

      손님 말대로만 해서 결과 아쉬웠던 선생님 있으면 공유해줘.
    reply: |
      '통역' 잘하는 법 하나. 손님 말 듣고 바로 시작하지 말고, 딱 한 번 되물어.
      "평소에 화장 얼마나 하세요?" "관리에 시간 쓸 수 있어요?"
      이 두 개면 어울리는 디자인이 거의 나와. 라이프스타일이 디자인을 정하거든.
      다들 상담할 때 꼭 물어보는 질문 있어? 하나만 알려줘.

  - id: notion-3a4f83fe90bd8137b2fdff9e41ed676f
    title: "💬 3. 손님이 해달라는 대로 다 해줬더니 단골이 안 생겼다"
    scheduled_at: "2026-07-26T21:30:00+09:00"
    approved: true
    body: |
      처음엔 손님이 원하는 대로 다 해줬어.
      "자연스럽게요" 하면 자연스럽게,
      "길게요" 하면 길게.

      친절한 줄 알았지.
      근데 이상하게 재방문이 안 붙더라.

      이유를 나중에 알았어.
      손님은 '자기 눈에 뭐가 어울리는지' 몰라.
      그냥 아는 단어로 말하는 것뿐이야.

      그때부터 바꿨어.
      원하는 걸 듣되, 눈매를 보고
      "○○님은 이게 더 어울려요" 먼저 제안했어.

      그랬더니 결과가 예뻐지고
      "어떻게 이렇게 잘 아세요?" 소리 들으면서
      단골이 붙기 시작했어.

      시키는 대로만 하는 건 기사고,
      어울리는 걸 짚어주는 게 전문가야.

      손님 말대로만 해주고 있는 선생님 있으면 이 글 공유해줘.
    reply: |
      포인트는 '거절'이 아니라 '제안'이야.
      "그건 안 돼요"가 아니라 "그것도 좋은데, ○○님 눈엔 이게 더 살아요."
      손님 선택을 뺏는 게 아니라 더 나은 선택지를 얹는 거지.
      다들 손님이 원하는 디자인이랑 어울리는 게 다를 때 어떻게 풀어? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd81f592cad583bb70a2d3
    title: "📈 4. 실력 안 느는 정체기, 이렇게 뚫어"
    scheduled_at: "2026-07-27T21:30:00+09:00"
    approved: true
    body: |
      아무리 해도 실력이 안 는다? 정체기야. 4개로 뚫어.

      1. 내 작업물 기록
         매번 사진. 한 달 전이랑 비교해야 는 게 보여.

      2. 한 번에 하나만 고치기
         오늘은 '방향'만, 다음은 '간격'만.
         다 고치려면 하나도 안 고쳐져.

      3. 잘하는 사람 것과 비교
         막연한 감탄 말고 '차이'를 구체적으로.

      4. 리터치 때 복기
         내가 붙인 게 어떻게 남았나가 진짜 성적표.

      정체기는 못하는 게 아니라
      '다음 단계 직전'이라는 신호야.

      정체기로 답답한 선생님 있으면 저장하라고 공유해줘.
    reply: |
      딱 하나면 '2번(한 번에 하나만)'이야. 초보일수록 조급해서 다 잘하려다 다 어정쩡해져.
      이번 주는 '방향' 하나만 잡는다 정하고 그것만 봐. 하나 완성되면 다음으로.
      다들 지금 딱 하나 고친다면 뭘 고치고 싶어? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd81c7a86bc4b1917219ae
    title: "📈 4. 손 빠른 게 실력이라는 착각 ⭐"
    scheduled_at: "2026-07-28T21:30:00+09:00"
    approved: true
    body: |
      속도 빠른 게 실력인 줄 알지?
      아니야. 그건 '숙련'이지 '실력'이 아니야.

      빨리 붙이는데 유지가 안 되면
      그건 빨리 망치는 거야.

      속도는 정확도가 쌓이면 저절로 따라와.
      순서가 반대면 평생 빠르기만 하고 안 늘어.

      느려도 정확하게. 그게 결국 제일 빠른 길이야.

      근데 '왕초보' 때는 얘기가 완전 달라.
      그 기준은 댓글에 적어둘게 👇
    reply: |
      '왕초보'라면 반대로 해. 이땐 '많이 붙여보는 것'이 먼저야.
      한 명한테 10가닥 붙이고 끝내는 거랑, 100가닥을 붙여보는 건 손에 익는 속도가 완전히 달라.
      그러니 감이 잡히기 전까진 양으로 익혀.
      감이 온 다음이 진짜야. 한 명을 하더라도 '전체 디자인 흐름'을 읽을 줄 알아야 해. 거기서부터 정확도로 넘어가는 거지.
      다들 지금 '양'을 쌓는 단계야, '흐름'을 읽는 단계야? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd8193a9efd13f7708601b
    title: "📈 4. 연습만 죽어라 했는데 실력이 안 늘던 시절"
    scheduled_at: "2026-07-29T21:30:00+09:00"
    approved: true
    body: |
      나도 초반엔 연습만 죽어라 했어.
      하루에 몇 개씩, 손 아프게.

      근데 이상하게 실력이 딱 멈춘 구간이 왔어.
      양은 느는데 결과물은 그대로.

      그때 깨달은 게 있어.
      '많이'가 아니라 '피드백 있는' 연습이어야 늘더라.

      그냥 반복하면 틀린 습관을 굳히는 거야.
      뭘 틀리는지 모르고 100개 하면
      틀린 게 100개 쌓이는 거지.

      그래서 내 시술을 사진으로 남기고
      전이랑 비교했어. 뭐가 달라졌는지.

      연습량보다 '내 걸 볼 줄 아는 눈'이
      실력을 만들었어.

      연습해도 안 는다고 느끼는 선생님 있으면 이 글 공유해줘.
    reply: |
      제일 빨리 느는 법. 잘하는 사람 작업물이랑 내 걸 나란히 놓고 '차이'를 찾아.
      막연히 "더 잘하고 싶다" 말고, "나는 여기 결이 뜬다"처럼 구체적으로.
      차이를 못 보면 못 고쳐. 보는 순간 고쳐져.
      다들 요즘 실력에서 제일 답답한 부분이 뭐야? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd81fdabeac2737a019638
    title: "📸 5. 문의 부르는 시술 사진, 5가지만 지켜"
    scheduled_at: "2026-07-30T21:30:00+09:00"
    approved: true
    body: |
      시술 사진, 이 5개만 지켜도 문의가 달라져.

      1. 밝은 빛
         창가 자연광 최고. 어두우면 다 죽는다.

      2. 눈 아래 각도
         위에서 살짝 내려찍으면 눈매가 예쁘게 나와.

      3. 비포 → 애프터
         변화가 보여야 사람이 반응해.

      4. 클로즈업 한 컷
         결·컬이 보이는 디테일 샷. 전문가로 보여.

      5. 첫 줄 문구
         "속눈썹" 말고 "눈 처진 분들 이 컬 추천"처럼 '내 얘기' 싶게.

      시술은 실력, 사진은 '보이는 실력'이야.
      둘 다 챙겨야 손님이 와.

      저장해두고 다음 시술부터 써봐. 사진 고민인 선생님 있으면 공유해주고.
    reply: |
      5개 중 하나면 '1번(빛)'이야. 나머지 다 좋아도 어두우면 말짱 도루묵.
      폰 카메라도 밝은 창가에선 충분히 예쁘게 나와. 장비 탓하기 전에 자리부터 옮겨봐.
      다들 주로 어디서(어떤 빛에서) 사진 찍어? 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd81bfa019ef5318bd261b
    title: "📸 5. 사진 못 찍으면 실력도 반토막이야 ⭐"
    scheduled_at: "2026-07-31T21:30:00+09:00"
    approved: true
    body: |
      "실력만 좋으면 손님은 알아서 와."
      반은 맞는데, SNS 시대엔 반은 틀려.

      손님이 널 처음 만나는 곳은
      시술대가 아니라 '사진'이야.

      아무리 잘해도
      사진에서 그게 안 보이면
      그 실력은 없는 거나 마찬가지야.

      억울하지? 근데 그게 현실이야.
      그러니 사진도 '기술'이라고 생각해.
      시술 오래 했으면 사진 몇 분은 투자해.

      잘 찍은 사진 한 장이
      광고보다 세게 손님을 데려와.

      사진을 대충 여기는 선생님 있으면 공유해줘.
    reply: |
      사진도 기술이라 연습하면 늘어. 딱 3개만. 밝은 빛 / 눈 아래 각도 / 배경 깔끔.
      이 3개만 지켜도 같은 시술이 두 배로 예뻐 보여.
      다들 사진 찍을 때 뭐가 제일 어려워? (조명? 각도? 편집?) 하나만 얘기해줘.

  - id: notion-3a4f83fe90bd8143b001d8ca598f727d
    title: "📸 5. 시술은 자신 있는데 왜 문의가 없을까 했더니"
    scheduled_at: "2026-08-01T21:30:00+09:00"
    approved: true
    body: |
      시술 실력은 늘었는데
      이상하게 SNS 문의가 없던 때가 있었어.

      한참 뒤에 알았어.
      문제는 실력이 아니라 '사진'이었어.

      똑같이 예쁘게 해놓고
      사진이 어두우면 그냥 그런 시술처럼 보이고
      잘 찍으면 실력이 두 배로 보이더라.

      손님은 시술대에 앉기 전엔
      내 사진으로만 나를 판단하잖아.

      그때부터 시술만큼 사진에 신경 썼어.
      조명, 각도, 눈 감은 컷 하나.
      문의가 그때부터 늘었어.

      실력은 시술대에서 증명하지만
      사진은 그 전에 나를 팔아.

      사진 대충 올리는 선생님 있으면 이 글 공유해줘.
    reply: |
      제일 크게 바뀐 건 '조명'이었어. 창가 자연광에서 눈 아래로 살짝.
      어두운 실내 형광등이 애써 한 시술을 제일 많이 죽여.
      비싼 장비보다 밝은 빛 하나가 사진을 살려.
      다들 시술 사진 찍을 때 제일 신경 쓰는 거 뭐야? 하나만 얘기해줘.
