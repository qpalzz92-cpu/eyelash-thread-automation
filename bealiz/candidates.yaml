      속눈썹 배우고 창업할 때
      제일 힘들었던 게 뭔 줄 알아?

      기술이 아니었어.
      기술은 배우면 됐거든.

      진짜 막막했던 건
      '그 다음'을 아무도 안 알려준 거야.

      가격은 얼마로 할지,
      손님은 어떻게 데려올지,
      재방문은 어떻게 만들지.

      학원에서 기술은 가르쳐줘도
      '먹고사는 법'은 아무도 안 가르쳐줬어.

      그래서 혼자 다 부딪히며 배웠어.
      틀리고, 다시 하고, 또 틀리고.

      지금 창업 준비하는 너는
      그 시간을 좀 줄였으면 좋겠어.
      그래서 여기다 하나씩 풀 거야.

      혼자 준비하느라 막막한 사람 있으면 이 글 공유해줘.
