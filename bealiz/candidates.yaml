  - key: consult-story
    title: "💬 3. 손님이 해달라는 대로 다 해줬더니 단골이 안 생겼다"
    category: 기술
    variant: 실패경험형+반전형
    recommended: false
    topic: "디자인 상담(스토리): 손님 말대로만 해주면 재방문 안 붙음. 손님은 어울리는 걸 모르고 아는 단어로 말할 뿐 → 진단해서 제안해야 전문가. ⚠️ 상담 관점(판단), 원장 교정 가능."
    body: |
      처음엔 손님이 원하는 대로 다 해줬어.
      "자연스럽게요" 하면 자연스럽게,
      "길게요" 하면 길게.

      친절한 줄 알았지.
      근데 이상하게 재방문이 안 붙더라.

      이유를 나중에 알았어.
      손님은 '자기 눈에 뭐가 어울리는지' 몰라.
      그냥 아는 단어로 말하는 것뿐이야.

      그때부터 바꿨어.
      원하는 걸 듣되, 눈매를 보고
      "○○님은 이게 더 어울려요" 먼저 제안했어.

      그랬더니 결과가 예뻐지고
      "어떻게 이렇게 잘 아세요?" 소리 들으면서
      단골이 붙기 시작했어.

      시키는 대로만 하는 건 기사고,
      어울리는 걸 짚어주는 게 전문가야.

      손님 말대로만 해주고 있는 선생님 있으면 이 글 공유해줘.
    reply: |
      포인트는 '거절'이 아니라 '제안'이야.
      "그건 안 돼요"가 아니라 "그것도 좋은데, ○○님 눈엔 이게 더 살아요."
      손님 선택을 뺏는 게 아니라 더 나은 선택지를 얹는 거지.
      너는 손님이 원하는 디자인이랑 어울리는 게 다를 때 어떻게 풀어? 하나만 얘기해줘.

