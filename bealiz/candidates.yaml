# 비올리즈 노션 게시판 후보 (속눈썹 연장·펌·창업·기술).
# 6원칙 적용. variant(유형) = 실제 첫 줄 훅 조합. 제목 = "이모지 N. 본제목"(주제별 고유 이모지).
# ★★ 기술 팩트는 전부 원장 발화에서만. 어시스턴트가 지어내지 않는다.
# 주제 1(🔒 유지력)은 3형식(스토리/직언반전/정보) — 원장이 준 지식 기반, 형식만 다르게.

candidates:
  - key: retention-story
    title: "🔒 1. 유지력 안 나오면 손님 탓부터 했던 내가"
    category: 연장
    variant: 실패경험형+반전형
    recommended: false
    topic: "유지력(스토리): 손님 탓→내 시술 원인 깨달음. 반복 컴플레인=신호. 원장 발화 기반. 댓글=밀착·락인 한 끗. ⚠️스토리 톤은 원장 경험에 맞춰 교정 필요."
    body: |
      솔직히 말하면, 예전엔 나도
      유지력 안 나오면 손님 탓부터 했어.

      "홈케어를 안 하셨네요."
      "클렌징을 세게 하셨나 봐요."

      근데 이상하지.
      한두 명이면 손님 문제인데
      비슷한 컴플레인이 자꾸 반복되는 거야.

      그때 깨달았어.
      반복된다는 건 손님이 아니라
      '내 시술'에 원인이 있다는 신호였어.

      그때부터 손님 탓 대신
      온습도, 글루, 전처리, 붙이는 법을 다시 봤어.
      유지력은 거기서부터 잡히더라.

      손님 탓하는 순간, 실력은 거기서 멈춰.
      원인을 내 안에서 찾을 때 기술이 늘어.

      유지력 때문에 고민인 선생님 있으면 이 글 공유해줘.
    reply: |
      제일 크게 바뀐 건 '밀착'이었어.
      원모(자연모)랑 가모(연장모)가 확실히 밀착된 상태에서 글루가 '락인'돼야 오래가.
      온습도·글루·전처리 다 맞는데도 안 나오면, 십중팔구 여기야.
      너는 유지력 안 나올 때 제일 먼저 뭘 의심해? 하나만 얘기해줘.

  - key: retention-real
    title: "🔒 1. 유지력 컴플레인이 반복된다면, 답은 우리 안에 있어 ⭐"
    category: 연장
    variant: 반전형+손해형
    recommended: true
    topic: "유지력(직언/반전): 반복 컴플레인=손님이 아니라 우리 샵 문제. 남 탓하면 실력 정체. 원장 발화 기반. 댓글=1~3 맞아도 안되면 4번(밀착·락인)+질문."
    body: |
      유지력 컴플레인, 손님 탓하기 제일 쉽지.
      근데 냉정하게 보자.

      어쩌다 한 명은 손님 변수 맞아.
      근데 '반복적으로' 나온다면?
      그건 손님이 아니라 우리 샵 문제야.

      인정하기 싫어도 여기서부터 실력이 갈려.
      남 탓하면 계속 그 자리고,
      내 안에서 원인 찾으면 기술이 늘어.

      손님 관리 얘기 꺼내기 전에
      온습도·글루·전처리·기법부터 점검해.

      반복 컴플레인은 문제가 아니라 '신호'야.
      공짜로 주는 내 샵 점검 리스트인 셈이지.

      유지력 때문에 스트레스받는 선생님 있으면 공유해줘. 남 탓만 하다 지치거든.
    reply: |
      1·2·3번(온습도·글루·전처리)이 다 맞는데도 안 나오면? 답은 4번, 기법이야.
      핵심은 '밀착' — 원모(자연모)와 가모(연장모)가 확실히 밀착된 상태에서 글루가 '락인'돼야 오래가.
      너는 이 4개 중 어디가 제일 자신 없어? 하나만 말해줘.

  - key: retention-info
    title: "🔒 1. 유지력 안 나올 때 체크할 4가지"
    category: 연장
    variant: 정보성형+반전형
    recommended: false
    topic: "유지력(정보/체크리스트): 손님 탓 전에 우리 샵 4체크(온습도·글루컨디션·전처리·기법). 반복=신호. 원장 발화 기반. 저장각=4체크. 댓글=1~3 맞아도 안되면 4번 밀착·락인+질문."
    body: |
      유지력 컴플레인, 손님 관리 탓부터 하지 마.

      "홈케어를 안 하셔서 그래요."
      이 말, 너무 쉽게 나오지?

      근데 어쩌다 한 명이 아니라
      유지력 컴플레인이 '반복적으로' 나온다면
      그건 손님 문제가 아니야.
      우리 샵 안에 원인이 있는 거야.

      손님 탓하기 전에, 이 4가지부터 체크해.
      1. 온습도
      2. 글루 컨디션
      3. 전처리
      4. 오래가게 붙이는 기법

      한 명은 변수지만, 여러 명이 반복되면 그건 '신호'야.
      원인을 우리 안에서 먼저 없애는 게 첫번째야.

      유지력 컴플레인 반복돼서 스트레스인 선생님 있으면
      이 글 공유해줘. 손님 탓만 하다간 진짜 원인을 놓쳐.

      1~3번 다 맞는데도 안 나오면? 진짜 답은 4번에 있어. 댓글에 적어둘게 👇
    reply: |
      1·2·3번(온습도·글루·전처리)이 다 맞는데도 유지력이 안 나온다? 그럼 답은 4번, 기법이야.
      핵심은 '밀착'이야. 원모(자연모)와 가모(연장모)가 확실히 밀착된 상태에서 글루가 '락인'돼야 오래가.
      글루양·환경 다 잡아도, 이 밀착이 안 되면 결국 안 남아.
      너는 1~4번 중 어디서 제일 막혀? 하나만 얘기해줘.
