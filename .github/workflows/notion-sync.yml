name: Notion Sync

# 노션 게시판 ↔ 스레드 큐 연동.
# - setup: 노션에 게시판(DB) 생성 (최초 1회, 이미 있으면 건너뜀)
# - push : candidates.yaml 후보를 노션에 추가
# - sync : 노션에서 '승인'된 글을 queue.yaml 로 옮김 → 자동 발행 대상이 됨
# 매일 20:30 KST 에 sync 실행(21:00 발행 전에 승인건 반영). 수동 실행도 가능.

on:
  schedule:
    - cron: "30 11 * * *"    # 매일 20:30 KST (발행 30분 전 승인건 반영)
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        type: choice
        default: sync
        options: [sync, push, setup, all, resync, rebuild]

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r automation/requirements.txt
      - name: 노션 연동 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python automation/notion.py ${{ github.event.inputs.mode || 'sync' }}
      - name: 변경사항 저장(commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/notion_config.json automation/state.json automation/queue.yaml
          if git diff --cached --quiet; then
            echo "변경사항 없음."
          else
            git commit -m "chore: notion sync 반영 [skip ci]"
            git push
          fi
