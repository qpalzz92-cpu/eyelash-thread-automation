name: Notion Push (batch candidates)

# candidates.yaml 의 대기중 후보를 노션 게시판으로 한 번에(batch) 올림.
# 매일 찔끔 X → 내가 batch를 만들면 이 워크플로를 돌려서 왕창 올림.
# 사용자는 노션에서 여러 개를 한 번에 '승인' → notion-sync 가 하루 하나씩 나눠 발행 예약.

on:
  workflow_dispatch:      # 필요할 때 수동/트리거로 실행 (자동 스케줄 없음)

permissions:
  contents: write

concurrency:
  group: notion-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r automation/requirements.txt
      - name: 후보 노션에 올리기(batch)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python automation/notion.py push
      - name: 변경사항 저장(commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/notion_config.json automation/state.json
          if git diff --cached --quiet; then
            echo "변경사항 없음."
          else
            git commit -m "chore: 노션 후보 batch push [skip ci]"
            git push
          fi
