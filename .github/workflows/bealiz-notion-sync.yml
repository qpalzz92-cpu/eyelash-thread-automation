name: Bealiz Notion Sync

# 비올리즈(속눈썹 기술) 노션 게시판 ↔ 스레드 큐 연동. (로아와 완전 분리 — bealiz/ 폴더)
# - setup: 노션에 게시판(DB) 생성 (최초 1회)
# - push : bealiz/candidates.yaml 후보를 노션에 추가
# - sync : 노션 '승인' 글을 bealiz/queue.yaml 로 이동 → 자동 발행 대상
# 매일 밤 8시 45분 KST 에 sync(밤 9시반 발행 전 승인건 반영). 수동 실행도 가능.

on:
  schedule:
    - cron: "45 11 * * *"    # 매일 밤 8시 45분 KST (11:45 UTC) — 밤 9시반 발행 전 승인건 반영
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        type: choice
        default: sync
        options: [sync, push, setup, all, resync, rebuild, rebuild-all]

permissions:
  contents: write

concurrency:
  group: bealiz-notion-sync
  cancel-in-progress: false

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r bealiz/requirements.txt
      - name: 노션 연동 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python bealiz/notion.py ${{ github.event.inputs.mode || 'sync' }}
      - name: 변경사항 저장(commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch bealiz/learnings.jsonl
          git add bealiz/notion_config.json bealiz/state.json bealiz/queue.yaml bealiz/learnings.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경사항 없음."
          else
            git commit -m "chore: bealiz notion sync 반영 [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
