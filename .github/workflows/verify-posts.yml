name: Verify Threads Posts

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 발행 결과 검증
        env:
          THREADS_ACCESS_TOKEN_ROA: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN_BEALIZ: ${{ secrets.THREADS_ACCESS_TOKEN_BEALIZ }}
        run: |
          python - <<'PY'
          import os, requests, json
          API = "https://graph.threads.net/v1.0"

          checks = [
              ("로아",     os.environ["THREADS_ACCESS_TOKEN_ROA"],    "18200020696368366"),
              ("비올리즈", os.environ["THREADS_ACCESS_TOKEN_BEALIZ"], "18142850392546962"),
          ]

          for label, token, pid in checks:
              print("=" * 50)
              print(f"[{label}] post_id={pid}")
              # 1) 계정 정보
              me = requests.get(f"{API}/me", params={"fields": "id,username,threads_profile_picture_url", "access_token": token}, timeout=30)
              print("  /me:", me.status_code, me.text[:300])
              # 2) 이 글 자체 조회
              r = requests.get(f"{API}/{pid}", params={
                  "fields": "id,permalink,text,timestamp,shortcode,is_reply,media_type,owner",
                  "access_token": token}, timeout=30)
              print("  /post:", r.status_code, r.text[:600])
              # 3) 최근 내 글 목록 (실제 계정에 뭐가 올라가있는지)
              t = requests.get(f"{API}/me/threads", params={
                  "fields": "id,permalink,text,timestamp",
                  "limit": 5, "access_token": token}, timeout=30)
              print("  최근 게시물 5개:", t.status_code)
              try:
                  for item in t.json().get("data", []):
                      print("    -", item.get("timestamp"), item.get("permalink"), repr((item.get("text") or "")[:40]))
              except Exception as e:
                  print("    (파싱 실패)", t.text[:300])
          PY
