name: Verify Threads Posts

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 토큰 진단
        env:
          THREADS_ACCESS_TOKEN_ROA: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN_BEALIZ: ${{ secrets.THREADS_ACCESS_TOKEN_BEALIZ }}
        run: |
          python - <<'PY'
          import os, requests
          API = "https://graph.threads.net"

          checks = [
              ("로아",     os.environ.get("THREADS_ACCESS_TOKEN_ROA", "")),
              ("비올리즈", os.environ.get("THREADS_ACCESS_TOKEN_BEALIZ", "")),
          ]

          for label, token in checks:
              print("=" * 55)
              tok_len = len(token)
              print(f"[{label}] 토큰 길이={tok_len} (0이면 Secret 비어있음)")
              if not token:
                  continue

              # 1) 기본 호출
              me = requests.get(f"{API}/v1.0/me", params={"fields": "id,username", "access_token": token}, timeout=30)
              print("  /me:", me.status_code, me.text[:250])

              # 2) 토큰 디버그 (유효성/권한/만료시각)
              dbg = requests.get(f"{API}/debug_token", params={"input_token": token, "access_token": token}, timeout=30)
              print("  debug_token:", dbg.status_code, dbg.text[:400])

              # 3) 장기 토큰 리프레시 시도 (토큰값은 출력 안 함, 상태/만료만)
              rf = requests.get(f"{API}/refresh_access_token",
                                params={"grant_type": "th_refresh_token", "access_token": token}, timeout=30)
              try:
                  j = rf.json()
              except Exception:
                  j = {}
              if "access_token" in j:
                  print("  refresh: OK — 리프레시 가능, expires_in(초)=", j.get("expires_in"))
              else:
                  print("  refresh:", rf.status_code, rf.text[:300])
          PY
