name: Bealiz Threads Auto-Post

# 비올리즈(속눈썹 기술) 스레드 자동 발행. (로아와 완전 분리 — bealiz/ 폴더 + 별도 토큰)
# - bealiz/queue.yaml 에서 승인·예정된 글 1개를 발행.
# - 발행할 글 없으면 아무것도 안 함(안전).

on:
  schedule:
    - cron: "30 12 * * *"    # 매일 밤 9시 30분 KST (12:30 UTC) — 하루 1개만
  workflow_dispatch:
    inputs:
      dry_run:
        description: "테스트 실행 (실제 발행하지 않고 미리보기만)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bealiz-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r bealiz/requirements.txt
      - name: 스레드 발행
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_BEALIZ }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID_BEALIZ }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          MAX_POSTS_PER_RUN: "1"
        run: python bealiz/post_to_threads.py
      - name: 발행 후 정리(같은 주제 미승인 형제 자동 보관)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python bealiz/notion.py cleanup

      - name: 발행 이력 저장(commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bealiz/state.json
          if git diff --cached --quiet; then
            echo "변경된 발행 이력이 없습니다."
          else
            git commit -m "chore: bealiz autopost state [skip ci]"
            for i in 1 2 3 4 5; do
              if git push; then break; fi
              echo "push 충돌 감지 → rebase 후 재시도 ($i)"
              git fetch origin main
              git rebase origin/main
            done
          fi
