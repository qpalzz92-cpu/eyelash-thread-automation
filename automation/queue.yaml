      비싼 수업료 다 내 돈으로 냈어.

      그 길을 원장님은
      조금 덜 헤맸으면 좋겠어서 그래.

      그래서 여기 다 풀고
      자주 나오는 질문은 따로 정리도 하고 있어.

      혼자 막막한 원장님, 팔로우해두고 따라와.
