      시술에만 매여 있으면 버는 만큼 딱 거기서 멈춰.
      '미래를 만드는 시간'을 어떻게 내는지, 여기서 하나씩 풀게 🤍

  - id: leaky-jar
    title: "7번 — 구멍 난 항아리 (신규보다 단골, 데이터)"
    scheduled_at: "2026-07-25T21:00:00+09:00"
    approved: false
    body: |
      손님 모으려고 광고, 이벤트 다 해봤어?
      근데 왜 남는 게 없지 싶지.

      마케팅엔 유명한 얘기가 있어.
