  - id: ep3
    title: "EP.3 손님이 뚝 끊긴 달, 제일 캄캄했던 시간"
    scheduled_at: "2026-07-27T21:00:00+09:00"
    approved: false
    body: |
      예약표가 텅 빈 걸 보고 손이 떨린 적 있어?

      나는 있어.
      잘 되던 달 다음에 갑자기 뚝.
      이유도 모르겠고, 물어볼 사람도 없었어.

      그때 매일 밤 검색만 했어.
      '손님 안 올 때', '단골 만드는 법'.
      근데 다 뻔한 말뿐이더라.

      그래서 그냥 내가 하나씩 뜯어봤어.
      · 다녀간 손님한테 왜 안 왔는지 물어보고
      · 다음 예약을 그 자리에서 잡아보고
      · 문자 한 통 보내보고

      거창한 게 아니라, 이 작은 것들이 예약표를 다시 채웠어.
    reply: |
      예약표 텅 빈 거 보고 무서웠던 적, 너만 그런 거 아니야.
      지금 그 시기면 댓글 줘. 내가 뭐부터 했는지 알려줄게.

  - id: ep4
    title: "EP.4 아무도 안 알려줘서, 발로 배웠다"
    scheduled_at: "2026-07-29T21:00:00+09:00"
    approved: false
    body: |
      나한테는 알려주는 사람이 없었어.

      기술은 학원에서 배웠지.
      근데 '사업'은 아무도 안 가르쳐줘.
      · 가격을 어떻게 정하는지
      · 손님을 어떻게 남기는지
      · 돈을 어떻게 관리하는지

      이건 어디서도 안 팔더라.

      그래서 그냥 내 몸으로 배웠어.
      틀리면 돈으로 배상하면서, 진짜 비싸게 배웠어.

      지금 이 계정을 만든 이유가 이거야.
      그 비싼 수업료, 원장님은 안 냈으면 해서.
    reply: |
      "이건 아무도 안 알려주더라" 싶은 거 하나 있으면 적어줘.
      내가 겪은 거면 여기서 풀어줄게.

  - id: ep5
    title: "EP.5 가격을 올린 날, 진짜 벌어진 일"
    scheduled_at: "2026-07-31T21:00:00+09:00"
    approved: false
    body: |
      손 떨면서 가격표를 바꿨어.

      '손님 다 떨어지면 어떡하지'
      그 생각에 며칠을 못 잤어.

      근데 결과는 반대였어.
      · 진짜 떠난 손님은 몇 안 됐고
      · 남은 손님은 오히려 더 만족했어
      · '여긴 뭔가 다르다'는 신호가 됐거든

      싸움을 가격으로 하면 계속 깎여.
      근데 '이유'로 하면 안 깎여.

      나는 이 한 번의 결정으로
      10년 중 제일 크게 바뀌었어.
    reply: |
      가격 올리는 거 무섭지? 나도 그랬어.
      지금 올리고 싶은데 못 올리고 있는 시술 있어? 댓글로 얘기해보자.

  - id: ep6
    title: "EP.6 혼자 다 하다 무너질 뻔한 날"
    scheduled_at: "2026-08-02T21:00:00+09:00"
    approved: false
    body: |
      1인샵의 진짜 적은 손님이 아니라 '나 혼자'였어.

      시술하고, 예약받고, 청소하고, 정산하고.
      아프면 문 닫아야 하고
      쉬면 그날 매출은 0.

      어느 날 시술하다 손이 안 움직이더라.
      몸이 먼저 멈춰버린 거야.

      그때 결심했어.
      '나 없이도 돌아가게 만들자'고.

      기술자로 남으면 몸값에 갇히고
      시스템을 만들면 몸에서 벗어나.
      이걸 그날 몸으로 깨달았어.
    reply: |
      혼자 다 하느라 몸 갈아넣고 있는 원장님, 오늘 몇 명 봤어?
      그 마음 알아서 그래. 조금은 덜어내자.

