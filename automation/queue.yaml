      17개 샵을 보면서 확실해졌어.
      잘되는 샵은 '새 손님'이 아니라
      '다시 오는 손님'을 설계하더라.

      구멍 난 항아리에 물 붓지 마.
      채우기 전에, 새는 곳부터 막아.
    reply: |
      지난달 온 손님 중, 이번 달에 다시 온 사람 몇 %야?
      그 숫자가 진짜 매출을 정해. 채우는 법, 여기서 풀게 🤍

  - id: next-booking
    title: "8번 — 다시 오게 하는 법: 다음을 정해주기 (실전)"
    scheduled_at: "2026-07-26T21:00:00+09:00"
    approved: false
    body: |
      손님이 다시 오게 만드는 건
      실력이 아니야. 딱 이거 하나야.

      '다음에 언제 와야 하는지'를
      손님이 알고 가느냐, 모르고 가느냐.

      대부분은 시술 끝나면
      "고생하셨어요~" 하고 그냥 보내.
      그럼 손님은 언제 올지 몰라서
      그냥 잊어버려.

      나는 시술 끝나면
      그 자리에서 다음 예약을 잡아드려.
      "3주 뒤에 봬요" 이 한마디가
      재방문을 확 바꿔.

      붙잡는 게 아니라
      '다음'을 정해주는 거야.
