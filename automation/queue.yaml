  - id: first-hire
    title: "13번 — 첫 직원 뽑던 날 (스토리)"
    scheduled_at: "2026-08-13T21:00:00+09:00"
    approved: false
    body: |
      첫 직원을 뽑던 날, 손이 떨렸어.

      '월급 줄 수 있을까,
      나만큼 해줄까,
