# 스레드 발행 대기열 (Threads Auto-Post Queue)
# =====================================================================
# 규칙:
#  - approved: true 이고, scheduled_at(예약시간)이 지난 글만 자동 발행됩니다.
#  - 초반 20개는 검토 단계 → 내용 확인 후 approved 를 true 로 바꾸세요(또는 나한테 "N번 승인"이라고 말하면 내가 바꿔줌).
#  - 한 번 실행에 1개만 발행됩니다(MAX_POSTS_PER_RUN). 폭주 방지.
#  - 발행 여부는 automation/state.json 에 기록되며, 이 파일은 사람이 관리하는 원본입니다.
# 시간대: scheduled_at 은 +09:00(KST)로 적으면 됩니다.
# =====================================================================

posts:
  - id: prologue
    title: "프롤로그 (고정글) — 속눈썹 10년의 기록"
    pin: true                       # 발행 후 프로필 상단에 '고정' 하세요(수동)
    scheduled_at: "2026-07-21T21:00:00+09:00"
    approved: false
    body: |
      10년.
      속눈썹 하나로만 버틴 시간이야.

      처음엔 기술만 좋으면 다 되는 줄 알았어.
      근데 손끝이 빨라도, 손님이 왜 다시 오는지 모르면
      매달 딱 제자리더라.

      기술 밖의 건 아무도 안 알려줘서
      발로 뛰며 틀리고, 다시 하고.
      그렇게 '내 몸이 아니라 시스템이 버는 구조'를 만들었어.

      지금은,
      · 내가 출근 안 해도 샵과 교육이 돌아가고
      · 가맹점이 17개가 됐고
      · 제품 주문·택배 접수도 자동으로 굴러가고
      · 콘텐츠도 자동으로 올라가

      이제 하고 싶은 건 하나야.
      내가 겪은 시행착오, 원장님들은 덜 겪게
      이 노하우를 여기 다 풀어놓는 것.

      혼자 막막한 원장님, 팔로우해두고 같이 가자. 🤍
    reply: |
      이 계정엔 시술 밖의 얘기 — 마케팅, 브랜딩, 시스템 — 하나씩 풀 거야.
      놓치기 싫으면 팔로우해둬 🤍

      그리고 남들 앞에선 말 못 하는 고민은 DM으로 편하게 줘. 나만 볼게.

  - id: manifesto-order
    title: "한 발 앞서 말해온 것 (마케팅→브랜딩→시스템)"
    scheduled_at: "2026-07-22T21:00:00+09:00"
    approved: false
    body: |
      남들이 "시술만 잘하면 돼" 할 때
      나는 마케팅이 중요하다고 했어.

      다들 "마케팅 잘해야 해" 할 때
      나는 브랜딩이 중요하다고 했어.

      다들 "브랜딩이 답이야" 할 때
      나는 결국 '시스템'이라고 했어.

      한 발씩 앞서 말해왔고, 다 맞았어.
      내가 그걸 다 직접 겪어봤거든.

      지금 원장님이 마케팅에서 멈춰 있다면
      그다음은 브랜딩, 그다음은 시스템이야.
      이 순서, 여기서 하나씩 풀어줄게.
    reply: |
      지금 원장님은 어디쯤이야?
      마케팅? 브랜딩? 시스템? 번호 말고 편하게 댓글로 적어줘.

  - id: labor-trap
    title: "잘 벌어도 문 닫는 이유 (노동 의존)"
    scheduled_at: "2026-07-24T21:00:00+09:00"
    approved: false
    body: |
      1인샵은 안 돼서 문 닫는다고 생각하지?

      근데 아니야.
      돈 잘 버는데도 문 닫는 샵이 꽤 많아.

      이유는 딱 하나야.
      '노동'에만 의존했거든.

      내 몸이 멈추면 매출도 멈추는 구조.
      아프면 끝, 지치면 끝.
      그래서 잘 벌어도 오래 못 가.

      결국 끝까지 살아남는 건
      내가 없어도 돌아가는 '시스템'을 만든 사람이야.
    reply: |
      지금 원장님 샵은, 내가 멈추면 매출도 멈춰?
      솔직하게 댓글로 얘기해보자. 나도 그랬으니까.

  - id: ep1
    title: "EP.1 첫 월급 70만원, 그날의 나"
    scheduled_at: "2026-07-25T21:00:00+09:00"
    approved: false
    body: |
      첫 월급 70만원 받던 날, 아직도 기억나.

      봉투 들고 집 가는 길에
      '이걸로 뭘 할 수 있지' 하고 계산하는데
      계산이 안 되더라.

      근데 그때 내가 제일 무서웠던 건 돈이 아니었어.
      '5년 뒤에도 딱 이만큼이겠구나'
      그 생각이 제일 무서웠어.

      기술은 늘고 있는데
      내 삶은 안 늘고 있었거든.

      지금 그때의 나 같은 원장님 있을 거야.
      그 마음, 내가 제일 잘 알아.

      이 시리즈, 그 마음 하나 보고 시작해.
      같이 가보자.
    reply: |
      지금 받는 돈, 5년 뒤에도 똑같을 것 같아서 불안한 적 있어?
      나만 그런 거 아니었으면 좋겠다. 편하게 얘기해줘.

  - id: ep2
    title: "EP.2 기술은 느는데 통장은 그대로였다"
    scheduled_at: "2026-07-25T21:00:00+09:00"
    approved: false
    body: |
      손이 빨라지면 돈도 벌 줄 알았어.

      시술 시간 30분에서 20분으로 줄이고
      하루에 한 명이라도 더 받으려고
      점심도 거르고 화장실도 참았어.

      근데 통장은 그대로더라.

      그때 처음 알았어.
      많이 하는 게 아니라
      '제대로 받는' 게 돈이 된다는 걸.

      몸값은 시간으로 오르는 게 아니라
      손님이 '이 값 낼 이유'를 느낄 때 올라.

      나는 이걸 몇 년이나 늦게 알았어.
      그래서 지금 이걸 제일 먼저 말해주고 싶어.
    reply: |
      혹시 지금도 "더 빨리, 더 많이"로 버티고 있어?
      나도 그랬어서 그래. 무리하지 마. 방법은 따로 있어.

  - id: ep3
    title: "EP.3 손님이 뚝 끊긴 달, 제일 캄캄했던 시간"
    scheduled_at: "2026-07-27T21:00:00+09:00"
    approved: false
    body: |
      예약표가 텅 빈 걸 보고 손이 떨린 적 있어?

      나는 있어.
      잘 되던 달 다음에 갑자기 뚝.
      이유도 모르겠고, 물어볼 사람도 없었어.

      그때 매일 밤 검색만 했어.
      '손님 안 올 때', '단골 만드는 법'.
      근데 다 뻔한 말뿐이더라.

      그래서 그냥 내가 하나씩 뜯어봤어.
      · 다녀간 손님한테 왜 안 왔는지 물어보고
      · 다음 예약을 그 자리에서 잡아보고
      · 문자 한 통 보내보고

      거창한 게 아니라, 이 작은 것들이 예약표를 다시 채웠어.
    reply: |
      예약표 텅 빈 거 보고 무서웠던 적, 너만 그런 거 아니야.
      지금 그 시기면 댓글 줘. 내가 뭐부터 했는지 알려줄게.

  - id: ep4
    title: "EP.4 아무도 안 알려줘서, 발로 배웠다"
    scheduled_at: "2026-07-29T21:00:00+09:00"
    approved: false
    body: |
      나한테는 알려주는 사람이 없었어.

      기술은 학원에서 배웠지.
      근데 '사업'은 아무도 안 가르쳐줘.
      · 가격을 어떻게 정하는지
      · 손님을 어떻게 남기는지
      · 돈을 어떻게 관리하는지

      이건 어디서도 안 팔더라.

      그래서 그냥 내 몸으로 배웠어.
      틀리면 돈으로 배상하면서, 진짜 비싸게 배웠어.

      지금 이 계정을 만든 이유가 이거야.
      그 비싼 수업료, 원장님은 안 냈으면 해서.
    reply: |
      "이건 아무도 안 알려주더라" 싶은 거 하나 있으면 적어줘.
      내가 겪은 거면 여기서 풀어줄게.

  - id: ep5
    title: "EP.5 가격을 올린 날, 진짜 벌어진 일"
    scheduled_at: "2026-07-31T21:00:00+09:00"
    approved: false
    body: |
      손 떨면서 가격표를 바꿨어.

      '손님 다 떨어지면 어떡하지'
      그 생각에 며칠을 못 잤어.

      근데 결과는 반대였어.
      · 진짜 떠난 손님은 몇 안 됐고
      · 남은 손님은 오히려 더 만족했어
      · '여긴 뭔가 다르다'는 신호가 됐거든

      싸움을 가격으로 하면 계속 깎여.
      근데 '이유'로 하면 안 깎여.

      나는 이 한 번의 결정으로
      10년 중 제일 크게 바뀌었어.
    reply: |
      가격 올리는 거 무섭지? 나도 그랬어.
      지금 올리고 싶은데 못 올리고 있는 시술 있어? 댓글로 얘기해보자.

  - id: ep6
    title: "EP.6 혼자 다 하다 무너질 뻔한 날"
    scheduled_at: "2026-08-02T21:00:00+09:00"
    approved: false
    body: |
      1인샵의 진짜 적은 손님이 아니라 '나 혼자'였어.

      시술하고, 예약받고, 청소하고, 정산하고.
      아프면 문 닫아야 하고
      쉬면 그날 매출은 0.

      어느 날 시술하다 손이 안 움직이더라.
      몸이 먼저 멈춰버린 거야.

      그때 결심했어.
      '나 없이도 돌아가게 만들자'고.

      기술자로 남으면 몸값에 갇히고
      시스템을 만들면 몸에서 벗어나.
      이걸 그날 몸으로 깨달았어.
    reply: |
      혼자 다 하느라 몸 갈아넣고 있는 원장님, 오늘 몇 명 봤어?
      그 마음 알아서 그래. 조금은 덜어내자.

  - id: ep7
    title: "EP.7 나 없이 돌아가는 시스템을 만들기 시작하다"
    scheduled_at: "2026-08-04T21:00:00+09:00"
    approved: false
    body: |
      '자동화'라고 하면 거창해 보이지?

      나도 처음엔 그랬어.
      근데 시작은 진짜 작았어.

      · 매번 설명하던 걸 안내문 하나로 만들고
      · 머릿속에만 있던 순서를 종이에 적고
      · 나만 알던 걸 누가 봐도 알게 정리했어

      이걸 하나씩 하니까
      내가 없어도 똑같이 굴러가더라.

      시스템은 큰 게 아니야.
      '내 머릿속을 밖으로 꺼내는 것'부터가 시작이야.

      이걸 몇 년 하니까 지금의 구조가 됐어.
    reply: |
      지금 '나만 아는 일' 때문에 못 쉬고 있는 거 있어?
      그거 하나 꺼내는 것부터 시작이야. 뭔지 적어줘, 같이 정리해보자.

  - id: ep8
    title: "EP.8 그래서 지금, 이 기록을 남기는 이유"
    scheduled_at: "2026-08-06T21:00:00+09:00"
    approved: false
    body: |
      10년을 돌아보면 하나야.

      '그때 누가 이것만 알려줬어도.'

      기술은 어디서든 배워.
      근데 기술 밖의 것들 —
      가격, 손님, 시스템, 버티는 마음 —
      이건 아무도 안 알려주더라.

      그래서 나는 기록하기로 했어.
      누가 알아주라고가 아니라
      10년 전의 나 같은 원장님 한 명이라도
      덜 헤매라고.

      이 계정은 내 사업 자서전이자
      막막한 원장님들 손잡는 곳이야.

      여기까지 읽었으면, 우리 이제 같이 가는 거다. 🤍
    reply: |
      프롤로그부터 여기까지 읽어준 원장님, 진짜 고마워.
      지금 제일 듣고 싶은 이야기 있어? 다음 시리즈는 그걸로 시작할게.
