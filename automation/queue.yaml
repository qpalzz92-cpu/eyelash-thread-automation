    title: "9번 — 처음 샵을 비운 날 (감성 스토리)"
    scheduled_at: "2026-08-05T21:00:00+09:00"
    approved: false
    body: |
      처음으로 샵을 하루 통째로 비운 날이 기억나.

      불안해서 종일 폰만 봤어.
      '별일 없나, 손님 컴플레인 없나.'

      근데 저녁에 확인하니
      아무 일 없이 그대로 돌아갔더라.

      그날 밤에 좀 울었어. 기뻐서.

      내가 없어도 되는 샵을 만들려고
      몇 년을 준비했는데
      그게 진짜 되는 걸 처음 본 거야.

      시술 잘하는 원장에서
      '없어도 되는 원장'이 되기까지.
      그 길, 여기 다 적을게.
    reply: |
      하루 마음 편히 쉬어본 게 언제야, 원장님?
      그럴 수 있는 샵, 진짜 만들 수 있어. 천천히 같이 가보자 🤍

  - id: automation-start
    title: "10번 — 자동화, 사실 별거 아니야 (+자료 씨앗)"
    scheduled_at: "2026-08-07T21:00:00+09:00"
