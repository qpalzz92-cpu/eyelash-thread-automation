# 스레드 발행 대기열 (Threads Auto-Post Queue)
# =====================================================================
# 규칙:
#  - approved: true 이고, scheduled_at(예약시간)이 지난 글만 자동 발행됩니다.
#  - 초반 20개는 검토 단계 → 내용 확인 후 approved 를 true 로 바꾸세요(또는 나한테 "N번 승인"이라고 말하면 내가 바꿔줌).
#  - 한 번 실행에 1개만 발행됩니다(MAX_POSTS_PER_RUN). 폭주 방지.
#  - 발행 여부는 automation/state.json 에 기록되며, 이 파일은 사람이 관리하는 원본입니다.
# 시간대: scheduled_at 은 +09:00(KST)로 적으면 됩니다.
# =====================================================================

posts:
  - id: prologue
    title: "프롤로그 (고정글) — 속눈썹 10년의 기록"
    pin: true                       # 발행 후 프로필 상단에 '고정' 하세요(수동)
    scheduled_at: "2026-07-21T21:00:00+09:00"
    approved: false
    body: |
      10년.
      속눈썹 하나로만 버틴 시간이야.

      처음엔 기술만 좋으면 다 되는 줄 알았어.
      근데 손끝이 빨라도, 손님이 왜 다시 오는지 모르면
      매달 딱 제자리더라.

      기술 밖의 건 아무도 안 알려줘서
      발로 뛰며 틀리고, 다시 하고.
      그렇게 '내 몸이 아니라 시스템이 버는 구조'를 만들었어.

      지금은,
      · 내가 출근 안 해도 샵과 교육이 돌아가고
      · 가맹점이 17개가 됐고
      · 제품 주문·택배 접수도 자동으로 굴러가고
      · 콘텐츠도 자동으로 올라가

      이제 하고 싶은 건 하나야.
      내가 겪은 시행착오, 원장님들은 덜 겪게
      이 노하우를 여기 다 풀어놓는 것.

      혼자 막막한 원장님, 팔로우해두고 같이 가자. 🤍
    reply: |
      이 계정엔 시술 밖의 얘기 — 마케팅, 브랜딩, 시스템 — 하나씩 풀 거야.
      놓치기 싫으면 팔로우해둬 🤍

      그리고 남들 앞에선 말 못 하는 고민은 DM으로 편하게 줘. 나만 볼게.

  - id: manifesto-order
    title: "한 발 앞서 말해온 것 (마케팅→브랜딩→시스템)"
    scheduled_at: "2026-07-20T00:00:00+09:00"
    approved: true
    body: |
      나는 늘 한 발 앞서 말했어. 그리고 다 맞았어.

      다들 "시술만 잘하면 돼" 할 때
      난 "시술은 기본이고, 이제 마케팅"이라고 했어.

      다들 "마케팅이 답이야" 할 때
      난 "손님을 남기는 건 브랜딩"이라고 했어.

      다들 "브랜딩이 중요해" 할 때
      난 "결국 시스템이 다 한다"고 했어.

      이 순서엔 이유가 있어.
      · 시술이 있어야 시작하고
      · 마케팅이 손님을 데려오고
      · 브랜딩이 그 손님을 단골로 남기고
      · 시스템이 내가 없어도 이걸 굴려

      지금 원장님이 어디서 멈춰 있든
      다음 계단은 이미 정해져 있어.
      그 계단, 여기서 하나씩 풀어줄게.
    reply: |
      근데 여기서 좀 무서운 얘기 하나.
      이 순서를 못 밟으면, 돈 잘 버는 샵도 문을 닫아.
      왜 그런지는 다음 글에서 풀게. (놓치기 싫으면 팔로우 🤍)

  - id: labor-trap
    title: "잘 벌어도 문 닫는 이유 (노동 의존)"
    scheduled_at: "2026-07-21T21:00:00+09:00"
    approved: true
    body: |
      1인샵은 안 돼서 문 닫는 줄 알지?

      아니야.
      돈 잘 버는데도 문 닫는 샵, 생각보다 많아.

      이유는 하나야.
      잘 벌 때 '다음'을 준비 안 했거든.

      몸으로만 굴리면
      버는 만큼 내 몸이 갈려.
      아프면 끝, 지치면 끝.
      그래서 잘 벌어도 오래 못 가.

      진짜 위험한 순간은 '잘될 때'야.
      그때 다음 계단(브랜딩·시스템)을 올려놔야
      오래, 그리고 편하게 벌 수 있어.

      끝까지 살아남는 원장은
      잘될 때 이미 다음을 준비한 사람이더라.
    reply: |
      잘될 때 다음을 준비하는 원장, 진짜 몇 없어.
      그 몇 명이 되고 싶으면 팔로우해둬. 다음 계단부터 같이 밟자 🤍

  - id: solo-real
    title: "4번 — 1인샵 원장만 아는 외로움 (공감)"
    scheduled_at: "2026-07-22T21:00:00+09:00"
    approved: true
    body: |
      1인샵 원장만 아는 외로움이 있어.

      아파도 내가 문 열어야 하고
      쉬면 그날 매출은 0이고
      막막해도 물어볼 사람 하나 없고.

      누가 대신 해줄 사람이 없잖아.

      나도 그랬어.
      시술만 하면 되는 게 아니잖아.
      예약, 상담, 청소, 정산, 홍보까지
      전부 나 혼자 짊어졌어.

      그때 제일 힘들었던 건
      '이걸 어떻게 바꾸는지' 아무도 안 알려준 거야.

      나도 방법을 몰라서 진짜 많이 헤맸어.
      근데 그렇게 헤매봤으니까
      어디서 막히는지 이제는 알아.

      그래서 혼자가 버거운 원장들은
      나랑 같이 가기로 한 사람도 있고
      혼자서 이 글 보며 따라오는 사람도 있어.

      어느 쪽이든 괜찮아.
      그 얘기, 여기서 차근차근 하나씩 해볼게.
    reply: |
      혼자 다 짊어지느라 애썼어, 원장님.
      여기선 하나씩, 천천히 같이 풀어보자.
      급하지 않아도 돼. 팔로우해두고 천천히 따라와 🤍

  - id: price-reason
    title: "5번 — 싼 가격이 원장을 지치게 한다 (데이터+17샵 시야)"
    scheduled_at: "2026-07-23T21:00:00+09:00"
    approved: true
    body: |
      미용업, 3년 생존율 73%로 전 업종 1등이래.

      작은 자본으로 시작해서, 한번 배운 기술은 평생 가.
      경기가 어려워도 사람들은 예뻐지는 걸 멈추지 않으니까.

      근데 뒤집어 보면
      그 '잘 버틴다'는 업종에서도
      4명 중 1명은 3년 안에 문을 닫아.

      17개 샵을 운영하면서 봤는데
      먼저 문 닫는 쪽은 대부분 '싸게' 승부한 샵이었어.

      가격을 낮추면 당장 손님은 차.
      근데 그만큼 더 많이, 더 오래 일해야 하고
      결국 원장이 먼저 지쳐.

      싼 가격은 손님이 아니라
      원장을 지치게 만드는 거였어.

      오래 가는 샵은 반대였어.
      '왜 이 값인지'를 만들어서
      제값 받고, 덜 지치고, 더 오래 갔어.

      가격을 내리지 말고, '이유'를 올려.
    reply: |
      지금 '싸게' 해서 손님 채우고 있다면 잠깐 멈춰봐.
      그건 오래 못 가는 방식이야.
      제값 받는 법, 여기서 계속 풀게. 팔로우해두면 돼 🤍
    # 출처: 미용실 3년 생존율 73.4%(국세청 기반, 파이낸셜뉴스 2025.04) / 자영업 5년 생존율 40.2%(한국경제 2025)

  - id: delegate-future
    title: "6번 — 덜 가져가도 미래를 샀다 (직언)"
    scheduled_at: "2026-07-24T21:00:00+09:00"
    approved: true
    body: |
      "직원 쓰면 남는 것도 없어."
      1인샵 원장님들이 제일 많이 하는 말이야.

      솔직히 말할게.
      나는 초반부터 직원이랑 했고
      직원보다 내가 덜 가져간 달도 있었어.

      손해 같지? 근데 아니야.
      나는 그 돈으로 '미래'를 산 거야.

      내가 시술대에만 붙어 있으면
      딱 그만큼 벌고 거기서 끝이거든.
      시술에서 손이 떠야
      그제서야 다음을 만들 시간이 생겨.

      당장 버는 것과, 오래 버는 건 달라.
      나는 오래 버는 쪽을 골랐어.
    reply: |
      시술에만 매여 있으면 버는 만큼 딱 거기서 멈춰.
      '미래를 만드는 시간'을 어떻게 내는지, 여기서 하나씩 풀게 🤍

  - id: leaky-jar
    title: "7번 — 구멍 난 항아리 (신규보다 단골, 데이터)"
    scheduled_at: "2026-07-25T21:00:00+09:00"
    approved: true
    body: |
      손님 모으려고 광고, 이벤트 다 해봤어?
      근데 왜 남는 게 없지 싶지.

      마케팅엔 유명한 얘기가 있어.
      새 손님 한 명 데려오는 비용이
      있던 단골 유지하는 것보다 몇 배는 비싸다는 거.

      근데 대부분 반대로 해.
      신규 유치에 돈은 다 쏟고
      정작 왔던 손님은 그냥 흘려보내.

      17개 샵을 보면서 확실해졌어.
      잘되는 샵은 '새 손님'이 아니라
      '다시 오는 손님'을 설계하더라.

      구멍 난 항아리에 물 붓지 마.
      채우기 전에, 새는 곳부터 막아.
    reply: |
      지난달 온 손님 중, 이번 달에 다시 온 사람 몇 %야?
      그 숫자가 진짜 매출을 정해. 채우는 법, 여기서 풀게 🤍

  - id: next-booking
    title: "8번 — 다시 오게 하는 법: 다음을 정해주기 (실전)"
    scheduled_at: "2026-07-26T21:00:00+09:00"
    approved: true
    body: |
      손님이 다시 오게 만드는 건
      실력이 아니야. 딱 이거 하나야.

      '다음에 언제 와야 하는지'를
      손님이 알고 가느냐, 모르고 가느냐.

      대부분은 시술 끝나면
      "고생하셨어요~" 하고 그냥 보내.
      그럼 손님은 언제 올지 몰라서
      그냥 잊어버려.

      나는 시술 끝나면
      그 자리에서 다음 예약을 잡아드려.
      "3주 뒤에 봬요" 이 한마디가
      재방문을 확 바꿔.

      붙잡는 게 아니라
      '다음'을 정해주는 거야.
    reply: |
      시술 끝나고 다음 예약, 그 자리에서 잡아드려?
      안 하고 있으면 오늘부터 딱 이거 하나만 해봐. 결과 달라져 🤍

  - id: first-day-off
    title: "9번 — 처음 샵을 비운 날 (감성 스토리)"
    scheduled_at: "2026-07-27T21:00:00+09:00"
    approved: true
    body: |
      처음으로 샵을 하루 통째로 비운 날이 기억나.

      불안해서 종일 폰만 봤어.
      '별일 없나, 손님 컴플레인 없나.'

      근데 저녁에 확인하니
      아무 일 없이 그대로 돌아갔더라.

      그날 밤에 좀 울었어. 기뻐서.

      내가 없어도 되는 샵을 만들려고
      몇 년을 준비했는데
      그게 진짜 되는 걸 처음 본 거야.

      시술 잘하는 원장에서
      '없어도 되는 원장'이 되기까지.
      그 길, 여기 다 적을게.
    reply: |
      하루 마음 편히 쉬어본 게 언제야, 원장님?
      그럴 수 있는 샵, 진짜 만들 수 있어. 천천히 같이 가보자 🤍

  - id: automation-start
    title: "10번 — 자동화, 사실 별거 아니야 (+자료 씨앗)"
    scheduled_at: "2026-07-28T21:00:00+09:00"
    approved: true
    body: |
      '자동화 시스템' 하면 거창해 보이지?

      프로그램 사야 하나, 개발자 필요한가 싶고.
      근데 아니야. 시작은 진짜 별거 아니야.

      · 매번 설명하던 걸 안내문 하나로 만들고
      · 머릿속 순서를 종이에 적고
      · 나만 알던 걸 누가 봐도 알게 정리하고

      이것만 해도 '나 없이 도는 구조'가 시작돼.

      거창한 도구가 아니라
      '내 머릿속을 밖으로 꺼내는 것'부터야.

      나는 이걸 몇 년 정리해서 지금 구조를 만들었어.
      그 과정, 하나씩 여기 풀게.
