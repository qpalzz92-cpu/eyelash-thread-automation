  - id: first-hire
    title: "13번 — 첫 직원 뽑던 날 (스토리)"
    scheduled_at: "2026-08-13T21:00:00+09:00"
    approved: false
    body: |
      첫 직원을 뽑던 날, 손이 떨렸어.

      '월급 줄 수 있을까,
      나만큼 해줄까,
      괜히 뽑는 거 아닐까.'

      솔직히 처음엔 내가 하는 게 더 빨랐어.
      가르치는 게 더 힘들었고.

      근데 그때 안 뽑았으면
      나는 아직도 시술대에만 있었을 거야.

      사람을 키우는 건
      당장은 손해 같지만
      내 시간을 되사는 유일한 방법이더라.
    reply: |
      혼자 다 하는 게 편한 것 같지? 근데 그게 제일 비싼 선택일 수도 있어.
      사람 쓰는 법, 겁 안 나게 하나씩 풀게 🤍

  - id: first-visit
    title: "14번 — 첫 방문이 단골을 정한다 (실전)"
    scheduled_at: "2026-08-15T21:00:00+09:00"
    approved: false
    body: |
      단골은 '두 번째 방문'에서 안 생겨.
      '첫 방문'에서 정해져.

      첫 손님이 오면 대부분
      시술만 잘하고 보내.
      근데 그게 끝이면 그냥 '한 번 온 사람'이야.

      나는 첫 손님한테 딱 3개를 해.
      · 왜 이 디자인을 추천하는지 말해주고
      · 집에서 관리법 하나 알려주고
      · 다음에 언제 오면 좋은지 정해줘.

      첫 방문에서 '이 사람 다르네'가 되면
      두 번째는 자동으로 와.
    reply: |
      첫 손님한테 시술만 하고 보내고 있진 않아?
      딱 이 3개만 해봐. 첫 방문이 단골을 정해 🤍

  - id: brand-reason
    title: "15번 — 우리 샵만의 이유 (브랜딩)"
    scheduled_at: "2026-08-17T21:00:00+09:00"
    approved: false
    body: |
      "이 샵은 왜 와야 해요?"
      이 질문에 3초 안에 답 못 하면
      그게 진짜 문제야.

      '친절해서요' '잘해서요'는 답이 아니야.
      옆집도 다 그렇게 말하거든.

      브랜딩은 거창한 로고가 아니야.
      '남들은 안 하는데 우리는 하는 것' 하나야.

      · 눈 모양 분석해서 디자인 짜주기
      · 관리 문자 챙겨 보내기
      뭐든 하나, 뾰족하게.

      그 하나가 '또 오는 이유'가 돼.
    reply: |
      '우리 샵만의 하나', 지금 딱 떠올려봐.
      없으면 그게 시작점이야. 만드는 법 같이 풀자 🤍

  - id: compare-self
    title: "16번 — 어제의 나랑 비교 (공감)"
    scheduled_at: "2026-08-19T21:00:00+09:00"
    approved: false
    body: |
      남의 샵 잘되는 거 보면
      마음이 쿵 내려앉을 때 있지.
      '나만 뒤처지나' 싶고.

      나도 그랬어.
      근데 SNS에 올라온 남의 샵은
      제일 잘 나온 순간만 보이는 거야.

      그 뒤에 얼마나 헤맸는지는 안 보여.

      비교는 남이랑 하는 게 아니라
      '어제의 나'랑 하는 거야.

      어제보다 손님 하나, 이유 하나 늘었으면
      그걸로 충분히 가고 있는 거야.
    reply: |
      오늘 남이랑 비교하느라 지쳤어?
      어제의 나보다 한 걸음이면 돼. 천천히 가자, 원장님 🤍

  - id: manual-start
    title: "17번 — 매뉴얼 첫걸음 (시스템)"
    scheduled_at: "2026-08-21T21:00:00+09:00"
    approved: false
    body: |
      '매뉴얼 만들어라' 하면 다들 막막해해.

      근데 나는 이렇게 시작했어.
      하루 동안 내가 하는 일을
      그냥 다 적었어.

      손님 맞기, 상담, 시술 순서,
      마무리 멘트, 청소, 정산까지.

      그걸 적고 보니
      '이건 남한테 넘겨도 되겠다' 싶은 게 보여.

      매뉴얼은 처음부터 완벽할 필요 없어.
      '내가 오늘 한 일'을 적는 것.
      거기서부터가 시스템이야.
    reply: |
      오늘 하루 한 일, 쭉 한번 적어봐.
      그중에 '나 아니어도 되는 일' 분명 있어. 그게 첫 칸이야 🤍

  - id: not-too-late
