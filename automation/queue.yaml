      이것만 해도 '나 없이 도는 구조'가 시작돼.

      거창한 도구가 아니라
      '내 머릿속을 밖으로 꺼내는 것'부터야.

      나는 이걸 몇 년 정리해서 지금 구조를 만들었어.
      그 과정, 하나씩 여기 풀게.
