    scheduled_at: "2026-08-23T21:00:00+09:00"
    approved: false
    body: |
      속눈썹 배우고 싶은데 늦었을까 고민이라면.

      솔직히 말할게. 안 늦었어.

      이 일은
      · 작은 자본으로 시작하고
      · 한번 배우면 평생 기술이고
      · 나이 들어도 할 수 있어.

      미용업이 3년 생존율 1위인 데는 이유가 있어.

      근데 딱 하나.
      '기술만' 배우고 시작하면 그때부터 헤매.
      기술이랑 '운영'을 같이 알아야 안 흔들려.

      그거까지 챙기면, 지금 시작해도 안 늦어.
    reply: |
      배울까 말까 고민이면, 뭐가 제일 망설여져?
      DM으로 편하게 물어봐. 나도 그 자리에서 시작했으니까 🤍

