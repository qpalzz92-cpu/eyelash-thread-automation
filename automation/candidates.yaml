      후기 없으면, 아무리 잘해도
      '그냥 모르는 샵'이야.

      17개 샵을 보면 확실해.
      잘되는 샵은 광고를 잘한 게 아니라
      '후기가 쌓이는 구조'를 만든 곳이었어.

      시술 끝에 한마디,
      "마음에 드시면 후기 한 줄만요."
