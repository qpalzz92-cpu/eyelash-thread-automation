candidates:
  - key: review-a
    title: "📣 마케팅 | 신규 손님은 광고보다 '후기' 보고 온다 (A·숫자)"
    category: 마케팅
    variant: A
    recommended: false
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입. A=숫자훅 / B=질문훅 / C=반전훅(추천)."
    body: |
      신규 손님, 광고보다 '후기' 보고 와.

      소비자 대부분이 방문 전에
      남들 후기부터 확인하거든.

      근데 원장님들은
      '알아서 써주겠지' 하고 안 챙겨.

      시술 잘하고도 후기가 없으면
      그 손님은 그냥 한 번 오고 끝이야.

      시술 끝나고 딱 한마디,
      "마음에 드시면 후기 한 줄만 부탁드려요."
      이거 하나가 신규를 데려와.

      기술은 나를 알리지 못해.
      후기가 나를 알려.
    reply: |
      지금 우리 샵 후기 몇 개야?
      시술 끝나고 후기 부탁, 오늘부터 해봐. 신규가 달라져 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: review-b
