    body: |
      "광고비 쓰는데 왜 신규가 안 늘까?"

      혹시 후기가 몇 개 없지 않아?

      사람들은 처음 가는 샵을
      후기로 판단해.
      후기 없으면 '검증 안 된 곳'이 되는 거야.

      광고로 데려와도
      후기가 없으면 그 앞에서 돌아가.

      신규를 늘리고 싶으면
      광고 먼저가 아니라 '후기 쌓기'부터야.

      시술 끝날 때 한마디면 충분해.
    reply: |
      후기 부탁, 쑥스러워서 못 하겠지? 나도 그랬어.
      근데 이 한마디가 광고보다 세. 문구 알려줄까? 🤍
