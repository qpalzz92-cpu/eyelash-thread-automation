  - key: complaint-story
    title: "📖 스토리 | 진상 손님 하나 때문에 하루 망친 날"
    category: 공감
    variant: 스토리텔링
    recommended: true
    topic: "진상/컴플레인 손님 대처: 한 명한테 휘둘리다 정작 단골을 놓침. 감정 대신 기준으로 대응하고, 불만은 말없이 떠나는 손님이 더 무섭다. 형식 3가지."
    body: |
      예전엔 진상 손님 하나한테
      하루를 통째로 뺏겼어.

      그 한 명 기분 맞추려다
      정작 좋은 단골은 못 챙기고.

      근데 어느 순간 깨달았어.
      모두를 붙잡으려는 게 문제였다는 걸.

      기준을 세우고 나서 편해졌어.
      정중히 안내하되, 선 넘으면 정중히 거절.

      지금은 그 응대 기준이 매뉴얼로 있어서
      직원도 나도 흔들리지 않아.

      그때의 나처럼 휘둘리는 원장님,
      진상 한 명보다 단골 한 명이 훨씬 소중해.
    reply: |
      내 기준 하나 공유할게: '3번 안내해도 선 넘으면 정중히 거절.'
      이 문장 하나 정해두면 안 흔들려.

