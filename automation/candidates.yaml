# 노션 게시판에 밀어넣을 '후보' 글 (영진이 방식: 한 주제 A/B/C안, ⭐추천 표시)
# 여기에 후보를 적고 push 하면 노션에 행으로 생김 → 노션에서 '승인'으로 바꾸면 자동 발행 큐로 이동.
# key 는 고유값(중복 금지). status 기본은 '후보'.

candidates:
  - key: review-a
    title: "📣 마케팅 | 신규 손님은 광고보다 '후기' 보고 온다 (A·숫자)"
    category: 마케팅
    variant: A
    recommended: false
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입. A=숫자훅 / B=질문훅 / C=반전훅(추천)."
    body: |
      신규 손님, 광고보다 '후기' 보고 와.

      소비자 대부분이 방문 전에
      남들 후기부터 확인하거든.

      근데 원장님들은
      '알아서 써주겠지' 하고 안 챙겨.

      시술 잘하고도 후기가 없으면
      그 손님은 그냥 한 번 오고 끝이야.

      시술 끝나고 딱 한마디,
      "마음에 드시면 후기 한 줄만 부탁드려요."
      이거 하나가 신규를 데려와.

      기술은 나를 알리지 못해.
      후기가 나를 알려.
    reply: |
      지금 우리 샵 후기 몇 개야?
      시술 끝나고 후기 부탁, 오늘부터 해봐. 신규가 달라져 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: review-b
    title: "📣 마케팅 | 광고비 쓰는데 왜 신규가 안 늘까? (B·질문)"
    category: 마케팅
    variant: B
    recommended: false
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입. A=숫자훅 / B=질문훅 / C=반전훅(추천)."
    body: |
      "광고비 쓰는데 왜 신규가 안 늘까?"

      혹시 후기가 몇 개 없지 않아?

      사람들은 처음 가는 샵을
      후기로 판단해.
      후기 없으면 '검증 안 된 곳'이 되는 거야.

      광고로 데려와도
      후기가 없으면 그 앞에서 돌아가.

      신규를 늘리고 싶으면
      광고 먼저가 아니라 '후기 쌓기'부터야.

      시술 끝날 때 한마디면 충분해.
    reply: |
      후기 부탁, 쑥스러워서 못 하겠지? 나도 그랬어.
      근데 이 한마디가 광고보다 세. 문구 알려줄까? 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: review-c
    title: "📣 마케팅 | 광고 쓰기 전에 이것부터 - 후기 (C·반전) ⭐"
    category: 마케팅
    variant: C
    recommended: true
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입. A=숫자훅 / B=질문훅 / C=반전훅(추천)."
    body: |
      광고에 돈 쓰기 전에, 이것부터 확인해.

      신규 손님이 안 오는 진짜 이유,
      실력이 아니라 '후기'일 때가 많아.

      사람들은 처음 가는 곳을
      남들 후기로 판단하거든.
      후기 없으면, 아무리 잘해도
      '그냥 모르는 샵'이야.

      17개 샵을 보면 확실해.
      잘되는 샵은 광고를 잘한 게 아니라
      '후기가 쌓이는 구조'를 만든 곳이었어.

      시술 끝에 한마디,
      "마음에 드시면 후기 한 줄만요."
      이게 제일 싼 광고야.
    reply: |
      지금 우리 샵, 후기 몇 개야?
      그 숫자가 신규를 정해. 후기 쌓는 법, 여기서 풀게 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  # ---- 노쇼 주제 세트 (형식: 스토리텔링/데이터/정보성) ----
  - key: noshow-story
    title: "📖 스토리 | 토요일에 노쇼 3명, 그날 내가 바꾼 것"
    category: 공감
    variant: 스토리텔링
    recommended: true
    topic: "노쇼(예약 부도): 1인샵의 숨은 매출 구멍. 대부분 '어쩔 수 없다'며 참지만 예약금+리마인더+규정 안내 세 장치로 크게 줄일 수 있음. 같은 주제, 형식만 3가지."
    body: |
      예약 꽉 찬 토요일, 3명이 연락도 없이 안 왔어.

      그 시간에 다른 손님 받을 수도 있었는데
      빈 의자만 보면서 속이 탔어.

      '내가 만만한가' 싶고
      '예약금 받자니 손님 떨어질까' 무섭고.

      근데 큰맘 먹고 예약금 제도를 넣었어.
      겁났는데 결과는 반대였어.

      진짜 올 손님만 남고
      노쇼는 거의 사라졌어.
      빈 의자로 태우던 돈이 그때부터 안 새더라.

      무서운 건 손님이 아니라
      '그냥 참는 나'였어.
    reply: |
      노쇼 때문에 속 태운 적 있지? 나도 그랬어.
      예약금, 어떻게 자연스럽게 넣는지 여기서 풀게 🤍

  - key: noshow-data
    title: "📊 데이터 | 노쇼로 5대 업종이 연 4.5조 날린다"
    category: 정보
    variant: 데이터
    recommended: false
    topic: "노쇼(예약 부도): 1인샵의 숨은 매출 구멍. 대부분 '어쩔 수 없다'며 참지만 예약금+리마인더+규정 안내 세 장치로 크게 줄일 수 있음. 같은 주제, 형식만 3가지."
    body: |
      노쇼, 그냥 재수 없는 일이 아니야. 통계가 있어.

      미용실 포함 5대 서비스업이
      노쇼로 날리는 돈이 1년에 4.5조원이래.
      (현대경제연구원 조사)

      1인샵으로 치면
      한 달에 몇 번만 펑크나도
      월세 한 번이 그냥 날아가는 셈이야.

      근데 대부분 '어쩔 수 없지' 하고 참아.
      참을수록 노쇼는 더 늘어.

      예약금 하나, 리마인더 문자 하나.
      이 작은 장치가 새는 매출을 막아줘.
    reply: |
      지금 노쇼 그냥 참고 있어? 그거 매출이 새는 거야.
      막는 법 하나씩 풀게. 놓치기 싫으면 팔로우 🤍
    sources: "현대경제연구원 노쇼 손실 추정(5대 서비스업 연 4.5조원, 미용실 포함)"

  - key: noshow-info
    title: "📝 정보 | 노쇼 줄이는 3단계 (저장각)"
    category: 정보
    variant: 정보성
    recommended: false
    topic: "노쇼(예약 부도): 1인샵의 숨은 매출 구멍. 대부분 '어쩔 수 없다'며 참지만 예약금+리마인더+규정 안내 세 장치로 크게 줄일 수 있음. 같은 주제, 형식만 3가지."
    body: |
      노쇼 줄이는 법, 딱 3단계야. 저장해둬.

      1. 예약할 때 '예약금' 걸기
         전액 아니어도 돼. 만 원이라도 마음가짐이 달라져.

      2. 시술 하루 전 '리마인더 문자'
         "내일 O시 예약 확인드려요 :)"
         깜빡한 노쇼가 확 줄어.

      3. 노쇼 규정 미리 안내
         "노쇼 시 예약금 환불 불가" 한 줄.
         민망한 게 아니라 프로처럼 보여.

      이 3개만 해도
      빈 의자로 새던 매출이 잡혀.
    reply: |
      지금 이 3개 중에 몇 개 하고 있어?
      하나도 안 하면 오늘 1번부터 딱 해봐 🤍

