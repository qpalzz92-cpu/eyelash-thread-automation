      (현대경제연구원 조사)

      1인샵으로 치면
      한 달에 몇 번만 펑크나도
      월세 한 번이 그냥 날아가는 셈이야.

      근데 대부분 '어쩔 수 없지' 하고 참아.
      참을수록 노쇼는 더 늘어.

      예약금 하나, 리마인더 문자 하나.
      이 작은 장치가 새는 매출을 막아줘.
