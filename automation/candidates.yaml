      제일 쉬운 것부터 하나: 예약 확정 문자에 '노쇼 시 예약금 환불 불가' 한 줄.
      이것만 넣어도 노쇼 절반은 준다. 진짜야.
    sources: "현대경제연구원 노쇼 손실 추정(5대 서비스업 연 4.5조원, 미용실 포함)"

  - key: noshow-info
