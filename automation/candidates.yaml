  - key: noshow-story
    title: "📖 스토리 | 토요일에 노쇼 3명, 그날 내가 바꾼 것"
    category: 공감
    variant: 스토리텔링
    recommended: false
    topic: "노쇼(예약 부도): 1인샵의 숨은 매출 구멍. 대부분 '어쩔 수 없다'며 참지만 예약금+리마인더+규정 안내 세 장치로 크게 줄일 수 있음. 같은 주제, 형식만 3가지."
    body: |
      노쇼로 속 태우던 거, 벌써 몇 년 전 얘기야.

      그땐 예약 꽉 찬 토요일에
      연락도 없이 빵꾸나면
      빈 의자 보면서 하루 종일 속상했어.

      '예약금 받자니 손님 떨어질까' 무서워서
      그냥 참기만 했지.

      근데 예약금 하나 넣고 규정 하나 세우니까
      노쇼가 거의 사라지더라.

      지금은 그 시스템이 알아서 돌아가서
      나는 노쇼 걱정 자체를 안 해.

      그때의 나처럼 참고 있는 원장님,
      참는 걸로는 아무것도 안 바뀌어.
    reply: |
      너희 샵은 노쇼 나면 그냥 넘어가? 아니면 예약금 받아?
      다들 어떻게 하는지 궁금해. 댓글로 알려줘.

  - key: noshow-data
