# 노션 게시판 후보. 고수 수준(역발상/현장 인사이트) + 터지는 6원칙 적용.
# 6원칙: ①첫줄 훅(베스트3) ②완독 흐름(실패→반전→이유→해결→결론)
#        ③저장각(체크리스트/문구) ④공유 문장(원장 타겟) ⑤댓글 유도 질문 ⑥100만 시리즈.
# variant(유형) = 그 글에 실제로 쓴 첫 줄 훅 조합. (숫자형/손해형/반전형/비밀공개형/정보성형/데이터형/실패경험형 중 베스트 조합)
# 본문은 자기완결로 끝내지 말고 핵심 하나는 댓글로 유도. 노션에서 '승인'하면 자동발행 큐로.

candidates:
  - key: review-a
    title: "📣 1. 신규 손님은 광고보다 '후기' 보고 온다"
    category: 마케팅
    variant: 반전형+정보성형
    recommended: false
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입."
    body: |
      신규 손님, 광고보다 '후기' 보고 와.

      소비자 대부분이 방문 전에
      남들 후기부터 확인하거든.

      근데 원장님들은
      '알아서 써주겠지' 하고 안 챙겨.

      시술 잘하고도 후기가 없으면
      그 손님은 그냥 한 번 오고 끝이야.

      시술 끝나고 딱 한마디,
      "마음에 드시면 후기 한 줄만 부탁드려요."
      이거 하나가 신규를 데려와.

      기술은 나를 알리지 못해.
      후기가 나를 알려.
    reply: |
      지금 우리 샵 후기 몇 개야?
      시술 끝나고 후기 부탁, 오늘부터 해봐. 신규가 달라져 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: review-b
    title: "📣 1. 광고비 쓰는데 왜 신규가 안 늘까?"
    category: 마케팅
    variant: 손해형+반전형
    recommended: false
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입."
    body: |
      "광고비 쓰는데 왜 신규가 안 늘까?"

      혹시 후기가 몇 개 없지 않아?

      사람들은 처음 가는 샵을
      후기로 판단해.
      후기 없으면 '검증 안 된 곳'이 되는 거야.

      광고로 데려와도
      후기가 없으면 그 앞에서 돌아가.

      신규를 늘리고 싶으면
      광고 먼저가 아니라 '후기 쌓기'부터야.

      시술 끝날 때 한마디면 충분해.
    reply: |
      후기 부탁, 쑥스러워서 못 하겠지? 나도 그랬어.
      근데 이 한마디가 광고보다 세. 문구 알려줄까? 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: review-c
    title: "📣 1. 광고 쓰기 전에 이것부터 - 후기 ⭐"
    category: 마케팅
    variant: 반전형+비밀공개형
    recommended: true
    topic: "후기(사회적 증거)의 힘. 신규 손님은 광고보다 남들 후기를 보고 방문을 정함. 대부분 원장은 후기를 안 챙겨서, 시술을 잘하고도 '검증 안 된 샵'이 됨. 시술 끝 '후기 한 줄 부탁' 습관이 제일 싼 신규 유입."
    body: |
      광고에 돈 쓰기 전에, 이것부터 확인해.

      신규 손님이 안 오는 진짜 이유,
      실력이 아니라 '후기'일 때가 많아.

      사람들은 처음 가는 곳을
      남들 후기로 판단하거든.
      후기 없으면, 아무리 잘해도
      '그냥 모르는 샵'이야.

      17개 샵을 보면 확실해.
      잘되는 샵은 광고를 잘한 게 아니라
      '후기가 쌓이는 구조'를 만든 곳이었어.

      시술 끝에 한마디,
      "마음에 드시면 후기 한 줄만요."
      이게 제일 싼 광고야.
    reply: |
      지금 우리 샵, 후기 몇 개야?
      그 숫자가 신규를 정해. 후기 쌓는 법, 여기서 풀게 🤍
    sources: "소비자 리뷰 신뢰도 조사(BrightLocal Local Consumer Review Survey 등) · 지역업종 후기 영향 통계"

  - key: noshow-story
    title: "📅 2. 예약금 세게 걸었더니 노쇼가 아니라 '신규'가 사라졌다"
    category: 공감
    variant: 손해형+반전형
    recommended: false
    topic: "노쇼: 예약금·리마인더 같은 뻔한 대책 말고, 역발상(예약금 세게 걸면 신규 준다/취소를 쉽게/단골화가 답/3종류 분류). 6원칙: 훅=손해형+반전형, 흐름=실패→반전→이유→해결→결론, 공유=노쇼 규정만 세우다 지친 원장, 댓글=경험 질문."
    body: |
      예약금 세게 걸었더니
      노쇼가 아니라 '신규'가 사라졌어.

      상습 노쇼 몇 명 막겠다고
      규정을 잔뜩 걸었거든.
      근데 겁먹고 빠진 건 진상이 아니라
      진짜 올 뻔한 착한 손님들이었어.

      그때 알았어.
      노쇼율이 높은 건 예약금이 없어서가 아니라
      '다시 올 이유'가 없어서였다는 걸.

      단골은 절대 노쇼 안 하거든.
      결국 답은 '규정'이 아니라 '단골화'였어.

      지금은 규정 대신 관계에 힘줘서
      노쇼 걱정 자체를 안 해.

      노쇼 규정만 세게 걸다 지친 원장님 있으면
      이 글 공유해줘. 방향이 틀렸던 거야.
    reply: |
      예약금을 굳이 걸 거면 팁 하나 —
      '환불 불가' 말고 '시술비에서 차감'이라고 안내해봐. 잃는 돈이 아니라 미리 낸 돈이 되니까 거부감이 확 줄어.
      같은 예약금인데 말 하나로 신규 이탈이 달라져.
      너는 노쇼 잡으려다 오히려 신규 잃은 적 없어? 있으면 하나만 얘기해줘.

  - key: noshow-data
    title: "📅 2. 노쇼는 '전날'에 몰린다 (다들 여기서 실수해)"
    category: 정보
    variant: 반전형+비밀공개형
    recommended: true
    topic: "노쇼: 예약금·리마인더 같은 뻔한 대책 말고, 역발상. 6원칙: 훅=반전형+비밀공개형, 흐름=통념→반전→이유→해결(댓글)→결론, 공유=전날 관리 원장, 댓글=우리 샵 취소 경험 질문."
    body: |
      노쇼, 언제 제일 많이 나는지 알아?

      2주 뒤 예약이 펑크날 것 같지?
      아니야. 애초에 그렇게 멀리는 예약을 안 해.

      진짜 펑크는 '전날, 당일'에 몰려.
      마음이 딱 그때 바뀌거든.

      그래서 노쇼는 '예약금'보다
      '전날 관리'에서 갈려.

      근데 여기서 다들 좋은 뜻으로 하는 짓이
      오히려 취소율을 폭증시켜.

      이거 하나 모르면 매출 계속 새.
      전날 관리 고민인 원장님 있으면 공유해줘.
      그게 뭔지, 댓글에 적어둘게. 👇
    reply: |
      바로 '전날 취소 링크'야.
      "못 오시면 여기서 취소하세요" 편하게 걸어주지? 좋은 뜻인데, 취소를 너무 쉽게 만들어서 '에이 그냥 취소' 눌러버려. 취소율이 확 뛴다.

      취소 문턱은 '적당히'가 정답. 취소하려면 전화 한 통은 하게. 너무 쉬우면 취소 폭증, 너무 어려우면 잠수(노쇼). 그 사이를 잡는 거야.
      너희 샵은 전날·당일 취소 많아? 어떻게 대응하는지 하나만 알려줘.
    sources: "현장 운영 경험(노쇼·취소는 전날·당일 집중) · 현대경제연구원 노쇼 손실 추정"

  - key: noshow-info
    title: "📅 2. 노쇼는 3종류다 (하나로 잡으려니 안 잡히지)"
    category: 정보
    variant: 정보성형+반전형
    recommended: false
    topic: "노쇼: 예약금·리마인더 같은 뻔한 대책 말고, 역발상(3종류 분류). 6원칙: 훅=정보성+반전, 저장각=3종류 체크리스트, 공유=노쇼 고생 원장, 댓글=우리 샵 유형 질문."
    body: |
      노쇼를 한 덩어리로 보면 절대 못 잡아. 3종류로 쪼개야 해.

      1. 깜빡형
         진짜 잊은 손님. 악의 없음.
         → 전날 리마인더 하나면 끝. 여기다 예약금 걸면 과잉이야.

      2. 습관형 (상습)
         원래 여기저기 펑크내는 사람.
         → 이 '소수'한테만 예약금·횟수 제한.
         전체한테 걸면 멀쩡한 신규가 겁먹고 빠져.

      3. 변심형
         전날·당일에 마음 바뀌는 손님. 노쇼의 진짜 주범.
         → 취소 문턱을 '적당히'. 너무 쉬우면(전날 취소링크) 취소 폭증,
         너무 어려우면 잠수. 전화 한 통은 하게 두는 게 딱이야.

      대부분 원장은 이 3개를 똑같이 대응해.
      그래서 상습 몇 명 잡으려다 신규까지 잃어.
      노쇼 대책은 '분류'부터야.

      이 3종류 저장해두고 너희 샵에 대입해봐.
      노쇼로 고생하는 원장님 있으면 공유해주고.
    reply: |
      너희 샵 노쇼는 이 셋 중 뭐가 제일 많아?
      대부분은 '변심형(전날·당일)'이 제일 많은데, 그걸 '깜빡형'인 줄 알고 리마인더만 늘리다 실패해.
      유형부터 봐야 대책이 맞아. 하나만 골라서 얘기해주면 맞는 대책 짚어줄게.

  - key: complaint-story
    title: "🛡️ 3. 진상 막으려다 좋은 손님을 잃었다"
    category: 공감
    variant: 실패경험형+반전형
    recommended: true
    topic: "진상·컴플레인: 규정 세게 X. 진상은 첫 상담에서 티 남(초반 선별). 6원칙: 훅=실패경험+반전, 흐름=실패→반전→이유→해결→결론, 공유=규정만 늘리는 원장, 댓글=진상 신호 질문."
    body: |
      진상 손님 하나 때문에
      가게 규정을 잔뜩 세게 만든 적이 있어.

      '이건 안 됩니다' 안내문 덕지덕지.
      근데 그거 보고 겁먹은 건
      진상이 아니라 착한 손님들이었어.

      정작 진상은 규정 있어도 진상 짓 하고,
      좋은 손님만 눈치 보다 발길 끊더라.

      그때 배웠어.
      진상은 '규정'으로 막는 게 아니라
      '초반에 안 맞는 손님을 정중히 거르는' 거라고.

      지금은 규정 대신 첫 상담에서 걸러.
      훨씬 조용하고 깔끔해.

      진상 때문에 규정만 늘리고 있는 원장님 있으면
      이 글 공유해줘. 방법이 반대야.
    reply: |
      진상은 사실 첫 상담 때 티가 나. 신호 몇 개 줄게 —
      가격만 깎으려 들거나, 예약을 자꾸 바꾸거나, 남 샵 욕부터 하는 사람.
      이럴 때 무리해서 잡지 마. 안 맞는 손님을 정중히 보내는 것도 실력이야.
      너는 '이건 진상이다' 싶은 신호 뭐 있어? 하나만 공유해줘.

  - key: complaint-data
    title: "🛡️ 3. 제일 무서운 건 컴플레인 하는 손님이 아니야"
    category: 공감
    variant: 반전형+손해형
    recommended: false
    topic: "진상·컴플레인: 조용히 떠난 손님이 진짜 위험. 6원칙: 훅=반전형+손해형, 흐름=통념→반전→이유→해결→결론, 공유=컴플레인 무서워하는 원장, 댓글=불만 받는 법 질문."
    body: |
      불만 있는 손님, 말하고 갈 것 같지?
      아니야. 대부분 아무 말 없이 그냥 안 와.

      그리고 그 침묵한 손님은
      주변엔 다 말해. 나쁜 경험은 좋은 경험보다
      훨씬 빨리, 멀리 퍼지거든.

      즉 컴플레인을 '말해주는' 손님은
      사실 고마운 손님이야. 고칠 기회를 준 거니까.

      진짜 위험한 건 조용히 사라진 손님이고.
      말없이 떠난 손님이 매출을 갉아먹어.

      컴플레인 무서워하는 원장님 있으면 공유해줘.
      침묵을 막는 한마디, 댓글에 적어둘게. 👇
    reply: |
      그래서 나는 '컴플레인 잘 하게' 문을 열어둬.
      시술 끝에 "혹시 아쉬운 점 있으면 편하게 말해주세요, 저한테 도움돼요" 이 한마디.
      방어하지 말고 이 문을 열어두는 게, 조용한 이탈을 막는 제일 싼 방법이야.
      너는 손님 불만, 어떻게 받는 편이야? 하나만 얘기해줘.
    sources: "부정적 경험의 입소문 파급이 긍정보다 크다는 고객경험 조사(불만 고객 다수는 말없이 이탈)"

  - key: complaint-info
    title: "🛡️ 3. 컴플레인 터졌을 때, 이 순서대로만 하면 돼"
    category: 공감
    variant: 정보성형
    recommended: false
    topic: "진상·컴플레인: 컴플레인은 방어하면 소문, 즉시 인정+대안이 답. 6원칙: 훅=정보성, 저장각=4단계 스크립트, 공유=컴플레인에 흔들리는 원장, 댓글=기억 남는 응대 질문."
    body: |
      컴플레인 응대, 감정으로 하면 무조건 져. 순서가 있어.

      1. 끊지 말고 끝까지 듣기
         중간에 변명하면 불에 기름이야.

      2. 사실 여부보다 '감정' 먼저 인정
         "불편하셨겠어요." 이 한마디부터.
         (내 잘못 인정이 아니라 감정 공감이야)

      3. 바로 '대안' 제시
         재시술/부분 수정/다음 방문 혜택 등.
         사과만 하고 대안 없으면 손님은 더 화나.

      4. 마무리는 '고마움'
         "말씀해주셔서 감사해요, 덕분에 고쳐요."

      핵심은 '방어하지 않기'.
      방어하는 순간 손님은 이기려고 들어.
      인정하고 대안 주면 오히려 단골 되는 경우도 많아.

      이 순서 저장해뒀다가 터졌을 때 그대로 써.
      컴플레인에 매번 흔들리는 원장님 있으면 공유해주고.
    reply: |
      진상과 진짜 컴플레인은 구분해야 해. 기준 하나 —
      '해결책을 원하면' 진짜 손님, '이겨먹으려 들면' 진상.
      전자는 위 순서로 잡고, 후자는 정중히 선 긋고 보내. 다 잡으려다 나만 갈려.
      기억에 남는 컴플레인 응대 있어? 어떻게 풀었는지 하나만 들려줘.

  - key: counsel-story
    title: "💰 4. '뭐 해드릴까요?' 이 말이 내 매출을 깎고 있었다"
    category: 브랜딩
    variant: 실패경험형+반전형
    recommended: false
    topic: "객단가: '뭐 해드릴까요'가 객단가를 죽임 — 원장이 진단해야. 6원칙: 훅=실패경험+반전, 흐름=실패→반전→이유→해결→결론, 공유=친절히 물어보다 객단가 새는 원장, 댓글=상담 첫 마디 질문."
    body: |
      예전엔 손님 오면 이렇게 물었어.
      "뭐 해드릴까요?"

      친절한 줄 알았지. 근데 그게
      내 객단가를 깎고 있었어.

      손님은 '자기가 아는 것'만 말하거든.
      제일 싼 기본 메뉴, 늘 하던 거.
      원장이 물어보면 손님이 메뉴를 짜는 셈이야.

      바꿨어. 묻는 대신 '진단'했어.
      눈매 보고, 라이프스타일 듣고
      "이런 게 더 어울리실 것 같아요" 먼저 제안.

      강매가 아니야. 손님은 몰랐던 선택지를 안 거고,
      객단가는 자연스럽게 올랐어.
      지금은 이 상담법을 원장들한테 매뉴얼로 가르쳐.

      '뭐 해드릴까요'로 객단가 새는 원장님 있으면
      이 글 공유해줘.
    reply: |
      한 끗 더 — 제안할 때 옵션을 '3개'로 줘봐. 하 / 중 / 상.
      사람은 셋 중 대부분 '중간'을 골라. (제일 싼 것도, 제일 비싼 것도 부담이라)
      기본 하나만 보여주면 기본만 나가. 중간 객단가는 '3옵션'에서 나와.
      너는 상담 첫 마디를 뭐라고 열어? 하나만 알려줘.

  - key: counsel-data
    title: "💰 4. 선택지를 3개 주면, 손님은 중간을 고른다"
    category: 브랜딩
    variant: 반전형+비밀공개형
    recommended: false
    topic: "객단가: 3옵션(하/중/상) 주면 중간을 고름(앵커링). 6원칙: 훅=반전형+비밀공개형, 흐름=통념→반전→이유→해결→결론, 공유=가격 올리기 무서운 원장, 댓글=우리 샵 옵션 수 질문."
    body: |
      사람은 '절대 가격'을 못 판단해. '비교'로만 판단해.

      그래서 메뉴를 하나만 보여주면
      비싼지 싼지 몰라서 망설여.
      근데 하·중·상 3개를 나란히 두면?
      대부분 '중간'을 골라.

      제일 싼 건 없어 보이고
      제일 비싼 건 부담되니까.

      객단가를 올리고 싶으면
      가격을 올리는 게 아니라
      '중간'을 내가 원하는 값에 세팅하면 돼.

      가격 올리기 무서운 원장님 있으면
      이 글 공유해줘. 방법이 따로 있어.
    reply: |
      이걸 실전에서 쓰는 법 — 진짜 팔고 싶은 걸 '중간'에 놓고,
      그 위에 일부러 비싼 '상' 옵션을 하나 만들어. 안 팔려도 돼.
      그게 있어야 중간이 '합리적'으로 보이거든. 상 옵션은 중간을 팔기 위한 미끼야.
      너희 샵 메뉴는 옵션이 몇 개야? 하나만 알려줘 — 구조 봐줄게.
    sources: "선택지 수와 중간 선택 편향(가격 앵커링·타협 효과) — 소비자 의사결정 연구"

  - key: counsel-info
    title: "💰 4. 객단가 올리는 상담, 이 4단계로 말해봐"
    category: 브랜딩
    variant: 정보성형
    recommended: true
    topic: "객단가: 진단→3옵션→중간 추천→가치 마무리. 6원칙: 훅=정보성, 저장각=4단계 스크립트+복붙 멘트, 공유=객단가 안 올라 고민인 원장, 댓글=DM CTA."
    body: |
      객단가는 '비싼 거 권하기'가 아니라 '진단하기'에서 올라. 멘트까지 줄게.

      1. 관찰 (말 걸기 전에)
         눈매, 기존 상태, 분위기 먼저 봐.

      2. 진단형 질문
         "평소에 아이라인 그리는 데 시간 얼마나 쓰세요?"
         → 니즈를 손님 입으로 꺼내게 해.

      3. 3옵션 제안 + 중간 추천
         "관리 편한 순으로 3가지 있는데,
          ○○님 라이프스타일엔 이 중간이 딱이에요."

      4. 이유 한 줄
         "이게 유지가 오래 가서 결국 더 경제적이에요."
         → 가격이 아니라 '가치'로 마무리.

      포인트: 손님이 '설득당했다'가 아니라
      '좋은 걸 알게 됐다'로 느끼게 하는 거야.
      강매는 한 번 팔고 끝, 진단은 단골을 만들어.

      이 스크립트 저장해두고 상담 때 그대로 써봐.
      객단가 안 올라 고민인 원장님 있으면 공유해주고.
    reply: |
      이 스크립트에서 제일 중요한 건 2번(진단형 질문)이야.
      손님이 스스로 '아 불편했지' 하고 니즈를 꺼내면, 제안은 그냥 받아들여져.
      우리 원장들 이 질문 하나 바꾸고 객단가가 눈에 띄게 올랐어.
      업종별(속눈썹·왁싱·피부) 진단 질문 예시 필요하면 DM 줘, 정리해서 보내줄게.

  - key: sns-story
    title: "📱 5. 팔로워 늘리기에 집착하다 시간만 날렸다"
    category: 마케팅
    variant: 실패경험형+손해형
    recommended: false
    topic: "SNS: 팔로워 수는 매출과 무관, 저장·DM이 매출. 6원칙: 훅=실패경험+손해형, 흐름=실패→반전→이유→해결→결론, 공유=팔로워 숫자에 매달리는 원장, 댓글=저장 잘 된 게시물 질문."
    body: |
      한때 팔로워 숫자에 목맸어.
      1만 되면 손님 밀려오는 줄 알고.

      이벤트, 맞팔, 별짓 다 해서 숫자는 늘렸는데
      정작 예약은 그대로였어.

      허탈하더라. 그때 깨달았어.
      팔로워는 '숫자'지 '손님'이 아니라는 걸.

      방향을 바꿨어.
      팔로워 대신 '저장'과 'DM'을 봤어.
      저장 많은 글이 진짜 손님을 데려오고
      DM 하나가 예약으로 이어졌거든.

      숫자를 늘리려 하지 말고
      '저장하고 싶은 글'을 만들어. 그게 진짜야.

      팔로워 숫자에 매달리는 원장님 있으면
      이 글 공유해줘.
    reply: |
      판단 기준 하나 줄게 — '좋아요' 말고 '저장 수'를 봐.
      저장은 "나중에 나도 해봐야지"의 신호라, 예약으로 이어질 확률이 훨씬 높아.
      좋아요 100보다 저장 10이 매출엔 더 세.
      너는 어떤 게시물이 저장 잘 됐어? 하나만 알려줘.

  - key: sns-data
    title: "📱 5. 도달은 팔로워가 아니라 '초기 반응 속도'가 정한다"
    category: 마케팅
    variant: 반전형+데이터형
    recommended: false
    topic: "SNS: 도달은 팔로워 아니라 초기 반응속도. 6원칙: 훅=반전형+데이터형, 흐름=오해→반전→이유→해결→결론, 공유=팔로워 수에 기죽은 원장, 댓글=올리는 시간 질문."
    body: |
      '팔로워 적어서 안 보이는 거야' — 이거 오해야.

      요즘 알고리즘은 팔로워 수로 안 밀어줘.
      올리고 '처음 30분~1시간'에
      얼마나 빨리 반응(저장·댓글)이 오는지로
      더 퍼뜨릴지 말지를 정해.

      그래서 팔로워 1천인데 터지고
      1만인데 묻히는 일이 생기는 거야.

      숫자 키우는 데 힘 빼지 말고
      '초반 반응 잘 나오는 시간'에 올리고
      '반응할 만한 한 줄'을 넣어.

      팔로워 수에 기죽은 원장님 있으면
      이 글 공유해줘. 그거 상관없어.
    reply: |
      그래서 올리는 '시간'이 중요해. 손님들이 폰 보는 시간(보통 밤 9~11시)에 올려야 초반 반응이 빨리 붙어.
      그리고 첫 댓글은 네가 달아서 대화를 열어놔 — 반응 속도가 빨라져서 알고리즘이 더 밀어줘.
      너는 보통 몇 시에 올려? 반응 잘 나오는 시간 있으면 하나만 공유해줘.
    sources: "소셜 알고리즘의 초기 인게이지먼트 가중(도달은 팔로워보다 초기 반응 신호에 좌우)"

  - key: sns-info
    title: "📱 5. 뭘 올려야 저장될까 — 터지는 게시물 5종"
    category: 마케팅
    variant: 정보성형+반전형
    recommended: true
    topic: "SNS: 완성 사진보다 '변화/과정'이 터짐. 6원칙: 훅=정보성+반전, 저장각=5종 리스트+첫줄 문구 예시, 공유=피드 고민 원장, 댓글=잘 나온 게시물 질문."
    body: |
      시술 완성 사진만 올리고 있지? 그게 제일 안 터지는 축이야.
      저장·공유되는 건 따로 있어. 5종 정리해줄게.

      1. 비포 → 애프터 (변화)
         사람은 완성보다 '달라지는 순간'에 반응해.

      2. 과정/비하인드
         시술 클로즈업, 손놀림. '전문가처럼' 보여.

      3. 손님이 자주 묻는 질문 답변
         "펌 며칠 만에 감아도 돼요?" → 저장각.

      4. 실패·주의 사례
         "이런 눈엔 이 디자인 피하세요" → 신뢰 폭발.

      5. 관리 팁
         집에서 오래 유지하는 법. 저장 1등 유형.

      완성 사진은 '자랑'이고
      저장되는 건 '도움'이야.
      자랑 말고 도움을 올려.

      이 5종 저장해두고 하나씩 올려봐.
      피드 뭘 올릴지 막막한 원장님 있으면 공유해주고.
    reply: |
      하나만 더 — 사진보다 '첫 줄 문구'가 저장을 정해.
      같은 비포애프터도 "속눈썹 연장"이라고 쓰면 안 눌러.
      "눈 처진 분들, 이 디자인만 피해도 인상 달라져요"처럼 '내 얘기네' 싶은 한 줄을 얹어. 저장률이 달라져.
      너는 어떤 게시물이 제일 잘 나왔어? 하나만 얘기해줘.

  - key: membership-story
    title: "🎟️ 6. 정기권을 '할인'으로 팔다가 샵만 싸 보였다"
    category: 시스템
    variant: 실패경험형+반전형
    recommended: false
    topic: "정기권: '할인'으로 팔면 싸구려. '편리함'으로 팔아야. 6원칙: 훅=실패경험+반전, 흐름=실패→반전→이유→해결→결론, 공유=정기권 안 팔려 고민인 원장, 댓글=파는 방식 질문."
    body: |
      정기권 처음 만들 때
      '많이 깎아주면 사겠지' 했어.

      4회에 20% 할인. 팍팍 깎았지.
      근데 이상하게 안 팔리고
      샵만 싸구려처럼 보이더라.

      바꿨어. 할인을 확 줄이고
      대신 '편리함'을 팔았어.
      "매번 예약 안 잡아도 돼요, 오실 때 관리해드려요."

      그랬더니 팔리기 시작했어.
      손님이 산 건 '할인'이 아니라
      '신경 안 써도 되는 편함'이었던 거야.

      정기권은 싸게 파는 게 아니라
      편하게 파는 거였어.

      정기권 안 팔려 고민인 원장님 있으면
      이 글 공유해줘.
    reply: |
      안 팔릴 때 진짜 이유는 대부분 하나야 — 손님이 '다 못 쓸까 봐' 부담스러운 거.
      유효기간을 넉넉히(혹은 무제한) 열어주면 오히려 더 사고 더 자주 와.
      '기간 안에 다 써야 함'이 구매를 막는 제일 큰 벽이야.
      너는 정기권 어떻게 팔아? 하나만 알려줘.

  - key: membership-data
    title: "🎟️ 6. 선불 손님이 더 자주 오고 더 많이 쓴다"
    category: 시스템
    variant: 반전형+손해형
    recommended: true
    topic: "정기권: 선불 고객이 LTV·재방문 높음. 6원칙: 훅=반전형+손해형, 흐름=통념→반전→이유→해결→결론, 공유=할인율만 보고 망설이는 원장, 댓글=DM CTA(월 구독 설계)."
    body: |
      정기권은 '할인 손해'가 아니야. 남는 장사야.

      선불(정기권) 손님은
      · 이미 냈으니 안 오면 손해라 더 자주 오고
      · 올 때마다 추가 시술도 더 쉽게 붙여.

      즉 재방문율도, 객단가도 다 올라가.
      한 명한테서 나오는 총매출(LTV)이
      일반 손님보다 훨씬 커.

      눈앞의 할인율만 보면 손해 같지만
      '그 손님이 1년간 쓸 돈'으로 보면
      정기권이 이겨.

      할인율만 보고 정기권 망설이는 원장님 있으면
      이 글 공유해줘.
    reply: |
      그래서 정기권은 '몇 회 묶음'보다 '월 정액(구독)'이 더 세.
      매달 자동으로 오게 되니까 리텐션이 훨씬 높아지거든.
      헬스장이 왜 월 회원제인지 생각해봐. 우리도 그 구조를 쓸 수 있어.
      우리 샵에 맞는 구독 설계 궁금하면 DM 줘, 예시 몇 개 보내줄게.
    sources: "선불·멤버십 고객의 재방문·LTV 우위(구독 모델의 리텐션 효과)"

  - key: membership-info
    title: "🎟️ 6. 팔리는 정기권, 이렇게 설계해"
    category: 시스템
    variant: 정보성형+반전형
    recommended: false
    topic: "정기권: 편리함/유효기간 넉넉/월구독/체험형 진입. 6원칙: 훅=정보성+반전, 저장각=4단계 설계 체크리스트, 공유=정기권 설계 막막한 원장, 댓글=권하는 타이밍 질문."
    body: |
      정기권 안 팔리는 집은 대부분 '설계'가 틀렸어. 4개만 잡아.

      1. 파는 이유 = 할인 X, 편함 O
         "예약 신경 안 써도 됨"을 앞세워.

      2. 유효기간 = 넉넉하게
         '다 못 쓸 부담'이 구매를 막아.
         길게 열거나 아예 무제한.

      3. 구조 = 횟수권보다 '월 구독'
         자동 재방문이 되게.

      4. 첫 진입 = 부담 없게
         큰 패키지 말고 '체험형 소액'부터.
         한 번 묶이면 다음은 쉬워.

      정기권은 '싸게'가 아니라
      '다시 올 이유를 미리 심는' 장치야.
      할인율 고민할 시간에 이 4개를 고쳐.

      이 4개 저장해두고 점검해봐.
      정기권 설계 막막한 원장님 있으면 공유해주고.
    reply: |
      추가로 — 정기권은 '결제 순간'이 아니라 '시술 끝 만족한 순간'에 권해야 성공률이 확 올라.
      막 예쁘게 되고 기분 좋을 때 "다음에도 이 컨디션 유지하려면~" 하고 자연스럽게.
      카운터에서 갑자기 들이밀면 부담스러워 안 사. 타이밍이 반이야.
      너는 정기권을 언제 권해? 하나만 얘기해줘.

  - key: burnout-story
    title: "🔋 7. 손이 아니라 '머리'가 먼저 지쳤다"
    category: 공감
    variant: 반전형+비밀공개형
    recommended: true
    topic: "번아웃: '많이 일해서'가 아니라 '전부 내가 결정해서'(결정 피로). 6원칙: 훅=반전형+비밀공개형, 흐름=실패→반전→이유→해결→결론, 공유=요즘 지친 원장, 댓글=제일 지치는 이유 질문."
    body: |
      번아웃 왔을 때, 난 몸이 문제인 줄 알았어.
      그래서 시술을 줄였지. 근데 안 나아지더라.

      알고 보니 문제는 몸이 아니라 '머리'였어.
      예약 몇 시에 받을지, 이건 얼마 받을지,
      저 손님 컴플레인 어떻게 할지…
      하루 종일 '결정'만 하고 있었던 거야.

      시술보다 그 '결정들'이 나를 태웠어.

      그래서 시술 시간을 줄이는 대신
      '결정할 일'을 줄였어.
      자주 하는 판단을 다 매뉴얼로 정해뒀지.
      "이럴 땐 이렇게" 규칙으로.

      머리가 쉬니까 그제야 번아웃이 풀리더라.

      요즘 이유 없이 지쳐 있는 원장님 있으면
      이 글 공유해줘. 몸이 아니라 머리일 수 있어.
    reply: |
      '쉰다'를 '아무것도 안 한다'로만 생각하지 마.
      진짜 회복은 '결정 안 해도 되는 상태'를 만드는 거야.
      매뉴얼 하나가 휴가보다 오래 가는 이유야.
      너는 요즘 뭐 때문에 제일 지쳐? 하나만 얘기해줘.

  - key: burnout-data
    title: "🔋 7. 1인 원장을 태우는 건 노동이 아니라 '결정 피로'"
    category: 공감
    variant: 반전형+비밀공개형
    recommended: false
    topic: "번아웃: 결정 피로. 6원칙: 훅=반전형+비밀공개형, 흐름=질문→반전→이유→해결→결론, 공유=번아웃 온 원장, 댓글=제일 자주 하는 결정 질문."
    body: |
      왜 1인샵 원장이 유독 빨리 지칠까.

      일이 많아서? 아니야. '혼자 다 결정해서'야.
      사람은 하루에 내릴 수 있는 '좋은 결정' 양이 정해져 있어.
      그걸 다 쓰면 판단력도, 의욕도 뚝 떨어져.
      (결정 피로)

      근데 1인샵은 크고 작은 결정이 하루 수백 개.
      직원이 없으니 물어볼 데도 없고.

      몸보다 이 '결정 총량'이 원장을 태워.

      번아웃 온 원장님 있으면 이 글 공유해줘.
      게을러서가 아니라, 구조 때문이야.
    reply: |
      그래서 고수 원장은 '결정할 일 자체를 줄여'.
      아침 루틴, 가격, 응대, 재료 발주… 반복되는 건 다 규칙으로 박아두는 거지.
      '매번 고민'을 '한 번 정해두고 그냥 따름'으로 바꾸면, 같은 일을 해도 안 지쳐.
      너는 하루에 제일 자주 하는 결정이 뭐야? 하나만 얘기해줘.
    sources: "결정 피로(decision fatigue) — 반복 판단이 정신적 소진을 부른다는 심리 연구"

  - key: burnout-info
    title: "🔋 7. 안 무너지는 시스템 만들기 (휴식 말고 구조)"
    category: 공감
    variant: 정보성형+반전형
    recommended: false
    topic: "번아웃: 쉬는 날 시스템에 박기·반복 결정 규칙화. 6원칙: 훅=정보성+반전, 저장각=4단계 구조 체크리스트, 공유=번아웃 직전 원장, 댓글=마지막으로 쉰 날 질문."
    body: |
      '쉬어라'는 말은 도움이 안 돼. 안 무너지는 '구조'를 만들어야 해. 4가지야.

      1. 쉬는 날을 '먼저' 박기
         생기면 쉬는 게 아니라, 예약 안 받는 날을 달력에 미리.
         그날은 없는 사람이야.

      2. 반복 결정을 규칙으로
         가격·응대·발주… "이럴 땐 이렇게"로 정해둬.
         고민 자체를 없애.

      3. '나 아니어도 되는 일' 넘기기
         청소·정산·안내는 사람이든 툴이든 넘겨.
         원장이 할 일은 원장만 할 수 있는 것만.

      4. 회복도 일정에 넣기
         손님 예약처럼 '내 쉬는 시간'도 예약해.
         빈 시간에 쉬려 하면 영원히 못 쉬어.

      핵심: 의지로 버티지 말고 구조로 버텨.
      의지는 바닥나지만 시스템은 안 지쳐.

      이 4개 저장해두고 하나씩 박아봐.
      번아웃 직전인 원장님 있으면 공유해주고.
    reply: |
      이 4개 중 딱 하나만 먼저 하라면 '1번(쉬는 날 먼저 박기)'이야.
      대부분 원장은 '한가해지면 쉬어야지' 하는데, 그날은 영원히 안 와.
      쉬는 날을 먼저 정하고 거기 맞춰 예약을 받아. 순서만 바꿔도 삶이 바뀌어.
      너는 마지막으로 제대로 쉰 게 언제야? 하나만 얘기해줘.
